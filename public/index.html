<title>BMP Command Center</title>

<script src="/socket.io/socket.io.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #161310;
  --bg-elevated: #1e1b18;
  --card: #1e1b18;
  --card-hover: #2d2926;
  --border: rgba(82,68,60,0.15);
  --border-hover: rgba(82,68,60,0.35);
  --text: #e9e1dc;
  --text-secondary: #d7c3b8;
  --text-muted: #9f8d83;
  --green: #7c9a6e;
  --green-bg: rgba(124,154,110,0.12);
  --green-glow: rgba(124,154,110,0.3);
  --red: #b85c4c;
  --red-bg: rgba(184,92,76,0.12);
  --orange: #c8875c;
  --orange-bg: rgba(200,135,92,0.12);
  --tan: #bfa87a;
  --tan-bg: rgba(191,168,122,0.12);
  --slate: #6e8494;
  --slate-bg: rgba(110,132,148,0.12);
  --purple: #8b7aa8;
  --purple-bg: rgba(139,122,168,0.12);
  --accent: #c8875c;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --shadow: 0 2px 8px rgba(0,0,0,0.2), 0 1px 3px rgba(0,0,0,0.15);
  --shadow-hover: 0 20px 40px -10px rgba(16,14,11,0.4), 0 8px 20px -6px rgba(200,135,92,0.1);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(82,68,60,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.view-enter { animation: fadeInUp 350ms var(--ease); }
@keyframes cardEntrance { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes progressFill { from { width: 0%; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes toastIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(16px); } }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes glowPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(200,135,92,0); } 50% { box-shadow: 0 0 12px 2px rgba(200,135,92,0.15); } }

.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column-reverse; gap: 8px; }
.toast { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 20px; font-size: 13px; color: var(--text); box-shadow: 0 20px 40px rgba(0,0,0,0.5); animation: toastIn 250ms var(--spring); display: flex; align-items: center; gap: 10px; }
.toast.removing { animation: toastOut 200ms var(--ease) forwards; }
.toast-success { border-left: 3px solid var(--green); }
.toast-error { border-left: 3px solid var(--red); }

[data-tooltip] { position: relative; }
[data-tooltip]::after { content: attr(data-tooltip); position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) scale(0.95); background: #2d2620; color: var(--tan); border: 1px solid var(--border); font-size: 12px; font-weight: 400; line-height: 1.4; padding: 6px 10px; border-radius: 8px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 150ms var(--ease), transform 150ms var(--ease); z-index: 600; max-width: 280px; white-space: normal; }
[data-tooltip]:hover::after { opacity: 1; transform: translateX(-50%) scale(1); transition-delay: 300ms; }

/* LOGIN */
.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 32px; }
.login-logo { width: 160px; height: auto; margin-bottom: 8px; border-radius: 50%; background: #100e0b; padding: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.login-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); }
.login-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px; width: 380px; max-width: 90vw; box-shadow: 0 20px 40px -10px rgba(16,14,11,0.5); }
.login-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 28px; color: var(--tan); letter-spacing: 0.5px; }
.login-field { margin-bottom: 20px; }
.login-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 8px; }
.login-select, .login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 12px 16px; font-family: var(--font); font-size: 14px; transition: all 200ms var(--ease); }
.login-select:focus, .login-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,135,92,0.1); }
.login-select option { background: var(--card); color: var(--text); }
.login-btn { width: 100%; background: linear-gradient(135deg, #ffb688, #c8875c); color: #161310; border: none; font-family: var(--font); font-weight: 700; font-size: 14px; padding: 14px; border-radius: var(--radius-sm); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 300ms var(--ease); margin-top: 8px; }
.login-btn:hover { box-shadow: 0 4px 16px rgba(200,135,92,0.3); transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(200,135,92,0.3); }
.login-error { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; min-height: 18px; }

/* NAV */
.nav { position: sticky; top: 0; z-index: 100; background: rgba(22,19,16,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 0 24px; display: flex; align-items: center; height: 64px; gap: 20px; border-bottom: 1px solid var(--border); }
.nav-brand { display: flex; align-items: center; gap: 14px; white-space: nowrap; flex-shrink: 0; }
.nav-logo { height: 68px; width: auto; object-fit: contain; position: relative; z-index: 101; pointer-events: none; border-radius: 0; background: none; padding: 0; box-shadow: none; }
.nav-brand-label { display: flex; flex-direction: column; line-height: 1; }
.nav-brand-title { font-weight: 800; font-size: 16px; letter-spacing: 3px; color: var(--text); text-transform: uppercase; }
.nav-tabs { display: flex; gap: 4px; margin: 0 auto; align-self: center; }
.nav-tab { background: none; border: none; color: var(--text-muted); font-size: 13px; font-family: var(--font); font-weight: 600; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; transition: all 300ms var(--ease); position: relative; text-transform: uppercase; letter-spacing: 1px; }
.nav-tab:hover { color: var(--text); background: rgba(200,135,92,0.06); }
.nav-tab.active { color: var(--orange); background: transparent; }
.nav-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); width: 60%; height: 2px; background: var(--orange); border-radius: 1px; }
.nav-tab-badge { position: absolute; top: 2px; right: 2px; background: var(--orange); color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
.nav-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; align-self: center; }
.nav-user { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--tan); background: rgba(191,168,122,0.08); border: 1px solid rgba(191,168,122,0.12); padding: 4px 12px; border-radius: 20px; }
.btn-new-task { background: linear-gradient(135deg, #ffb688, #c8875c); color: #161310; border: none; font-family: var(--font); font-size: 13px; font-weight: 700; padding: 8px 20px; border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap; transition: all 300ms var(--ease); text-transform: uppercase; letter-spacing: 0.5px; }
.btn-new-task:hover { box-shadow: 0 4px 16px rgba(200,135,92,0.3); transform: translateY(-1px); }
.btn-logout { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; font-family: var(--font); padding: 4px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all 300ms var(--ease); }
.btn-logout:hover { border-color: var(--red); color: var(--red); }
.hamburger { display: none; background: none; border: 1px solid var(--border); color: var(--text-secondary); width: 36px; height: 36px; border-radius: var(--radius-sm); cursor: pointer; align-items: center; justify-content: center; font-size: 18px; }
.mobile-menu { display: none; position: absolute; top: 70px; left: 0; right: 0; background: var(--card); border-bottom: 1px solid var(--border); padding: 8px; z-index: 99; }
.mobile-menu.open { display: flex; flex-direction: column; gap: 2px; }
.mobile-menu .nav-tab { text-align: left; padding: 12px 16px; }

/* MAIN */
.main { max-width: 1440px; margin: 0 auto; padding: 32px; }

/* CARDS */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow); transition: all 300ms var(--ease); }
.card:hover { border-color: var(--border-hover); }
.card-interactive { transition: all 300ms var(--ease); }
.card-interactive:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--border-hover); }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(200,135,92,0.25) 0%, transparent 60%); }

/* AVATAR RING */
.avatar-ring { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; background: #100e0b; border: 2px solid rgba(200,135,92,0.2); transition: border-color 300ms var(--ease), box-shadow 300ms var(--ease); }
.avatar-ring-sm { width: 32px; height: 32px; font-size: 18px; }
.avatar-ring-lg { width: 44px; height: 44px; font-size: 24px; }
.avatar-emblem { transition: filter 300ms var(--ease), transform 300ms var(--ease); }
.avatar-emblem:hover { filter: brightness(1.1) saturate(1.3); transform: scale(1.05); }

/* DASHBOARD */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 36px; }
.project-card { display: flex; align-items: center; text-decoration: none; color: var(--text); padding: 22px; gap: 16px; }
.project-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; border: 1px solid; }
.project-content { flex: 1; }
.project-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
.project-desc { font-size: 13px; color: var(--text-secondary); }
.project-arrow { color: var(--text-muted); font-size: 18px; opacity: 0.4; transition: all 300ms var(--ease); }
.project-card:hover .project-arrow { opacity: 1; transform: translateX(3px); }

.priority-list { display: flex; flex-direction: column; gap: 8px; }
.priority-item { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-radius: var(--radius-md); background: rgba(255,255,255,0.015); cursor: pointer; transition: all 300ms var(--ease); }
.priority-item:hover { background: rgba(200,135,92,0.04); transform: translateX(4px); box-shadow: 0 4px 16px rgba(200,135,92,0.08); }
.priority-item .avatar-emblem { width: 36px; min-width: 36px; }
.priority-item .chip { margin-left: auto; flex-shrink: 0; }
.priority-item-title { flex: 1; font-size: 14px; font-weight: 500; }

.agent-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.agent-card { display: flex; align-items: center; gap: 10px; padding: 18px; background: var(--card); border: 1px solid transparent; border-radius: var(--radius-md); transition: all 300ms var(--ease); }
.agent-card:hover { background: var(--card-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); border-color: var(--border-hover); }
.agent-card:hover .avatar-ring, .agent-card:hover .avatar-emblem { border-color: rgba(200,135,92,0.5); }
.agent-avatar { font-size: 24px; }
.agent-name { font-size: 14px; font-weight: 600; }
.agent-role { font-size: 11px; color: var(--text-muted); }

.activity-item { display: flex; align-items: center; gap: 10px; padding: 12px 8px; font-size: 13px; border-radius: var(--radius-sm); transition: background 150ms var(--ease); }
.activity-item + .activity-item { margin-top: 2px; }
.activity-item:hover { background: rgba(255,255,255,0.025); }
.activity-icon { font-size: 14px; flex-shrink: 0; }
.activity-actor { font-weight: 600; color: var(--accent); }
.activity-desc { color: var(--text-secondary); flex: 1; }
.activity-time { color: var(--text-muted); font-size: 11px; flex-shrink: 0; text-align: right; min-width: 50px; }

.sprint-section { margin-bottom: 36px; position: relative; overflow: hidden; background: var(--bg-elevated); border-radius: var(--radius-lg); padding: 32px; }
.sprint-section::after { content: ''; position: absolute; top: -80px; right: -80px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(200,135,92,0.12) 0%, rgba(200,135,92,0.04) 40%, transparent 70%); pointer-events: none; }
.sprint-section::before { content: ''; position: absolute; bottom: -40px; left: -40px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(124,154,110,0.06) 0%, transparent 70%); pointer-events: none; }
.sprint-hero-layout { display: flex; gap: 32px; align-items: flex-start; position: relative; z-index: 1; }
.sprint-hero-left { flex: 1; min-width: 0; }
.sprint-hero-right { display: flex; gap: 10px; flex-shrink: 0; }
.sprint-mission-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--orange); margin-bottom: 8px; }
.sprint-name { font-size: 36px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; margin-bottom: 16px; line-height: 1.1; }
.sprint-progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.sprint-progress-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
.sprint-pct { font-size: 14px; color: var(--text-secondary); font-weight: 700; }
.sprint-bar-wrap { background: rgba(255,255,255,0.04); border-radius: 8px; height: 10px; overflow: hidden; }
.sprint-bar-fill { height: 100%; border-radius: 7px; background: linear-gradient(90deg, var(--green), #8aad7a, var(--green)); background-size: 200% 100%; transition: width 800ms var(--ease); animation: progressFill 800ms var(--ease), shimmer 4s ease infinite; box-shadow: 0 0 16px rgba(124,154,110,0.4), 0 0 4px rgba(124,154,110,0.6); }
.sprint-stats { display: flex; gap: 10px; flex-wrap: wrap; }
.sprint-stat-card { background: rgba(255,255,255,0.03); border-radius: var(--radius-md); padding: 16px 20px; text-align: center; min-width: 110px; }
.sprint-stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.sprint-stat-num { font-size: 28px; font-weight: 900; color: var(--tan); line-height: 1; }

/* BOARD */
.sprint-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.sprint-selector select { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px; font-family: var(--font); font-size: 13px; cursor: pointer; }
.sprint-selector select:focus { outline: none; border-color: var(--accent); }
.board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; min-height: calc(100vh - 180px); }
.board-col { min-width: 260px; flex: 1; background: var(--bg-elevated); border-radius: var(--radius-lg); padding: 16px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
.board-col-scroll { flex: 1; overflow-y: auto; padding-right: 4px; }
.col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-shrink: 0; padding: 12px 14px; border-radius: var(--radius-sm); }
.col-header-left { display: flex; align-items: center; gap: 8px; }
.col-icon { font-size: 14px; }
.col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); }
.col-count { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }

.board-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 18px; margin-bottom: 10px; cursor: pointer; box-shadow: var(--shadow); transition: all 300ms var(--ease); animation: cardEntrance 300ms var(--ease) backwards; }
.board-card:hover { border-color: var(--border-hover); transform: translateY(-4px) scale(1.01); box-shadow: var(--shadow-hover); background: var(--card-hover); }
.board-card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.board-card-title { flex: 1; font-size: 13px; font-weight: 500; line-height: 1.5; }
.board-card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 12px; color: var(--text-secondary); }
.board-card-assignee { display: flex; align-items: center; gap: 4px; font-size: 12px; }
.board-card-branch { font-family: var(--mono); font-size: 11px; background: rgba(255,255,255,0.04); padding: 2px 8px; border-radius: 4px; color: var(--text-muted); }

.chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 0 10px; height: 24px; border-radius: 12px; border: 1px solid; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.3px; }
.chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.chip-queued { background: rgba(109,99,88,0.1); color: var(--text-muted); border-color: rgba(109,99,88,0.2); }
.chip-queued .chip-dot { background: var(--text-muted); }
.chip-in_progress { background: var(--orange-bg); color: var(--orange); border-color: rgba(200,135,92,0.2); box-shadow: 0 0 12px rgba(200,135,92,0.15); }
.chip-in_progress .chip-dot { background: var(--orange); animation: pulse 2s infinite; }
.chip-on_staging { background: var(--tan-bg); color: var(--tan); border-color: rgba(191,168,122,0.2); }
.chip-on_staging .chip-dot { background: var(--tan); }
.chip-review { background: var(--purple-bg); color: var(--purple); border-color: rgba(139,122,168,0.2); }
.chip-review .chip-dot { background: var(--purple); }
.chip-complete { background: var(--green-bg); color: var(--green); border-color: rgba(124,154,110,0.2); }
.chip-complete .chip-dot { background: var(--green); }

.rank-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 800; padding: 2px 8px; height: 22px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
.rank-1 { background: var(--red-bg); color: var(--red); border: 1px solid rgba(184,92,76,0.2); }
.rank-2 { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(200,135,92,0.2); }
.rank-3 { background: var(--tan-bg); color: var(--tan); border: 1px solid rgba(191,168,122,0.15); }
.rank-4 { background: var(--slate-bg); color: var(--slate); border: 1px solid rgba(110,132,148,0.15); }
.rank-5 { background: rgba(109,99,88,0.08); color: var(--text-muted); border: 1px solid rgba(109,99,88,0.15); }

/* COMMS */
.comms-layout { display: flex; gap: 0; height: calc(100vh - 80px); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
.comms-sidebar { width: 280px; min-width: 280px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.comms-sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.comms-sidebar-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); }
.btn-new-channel { background: none; border: 1px solid var(--border); color: var(--text-muted); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 300ms var(--ease); }
.btn-new-channel:hover { border-color: var(--accent); color: var(--accent); background: var(--orange-bg); }
.comms-channels { flex: 1; overflow-y: auto; padding: 8px; }
.channel-item { padding: 10px 12px; border-radius: var(--radius-md); cursor: pointer; margin-bottom: 2px; transition: all 300ms var(--ease); display: flex; flex-direction: column; gap: 4px; border-left: 3px solid transparent; }
.channel-item:hover { background: rgba(255,255,255,0.03); }
.channel-item.active { background: rgba(200,135,92,0.12); border-left-color: var(--orange); }
.channel-item-header { display: flex; justify-content: space-between; align-items: center; }
.channel-item-name { font-weight: 600; font-size: 13px; color: var(--text); }
.channel-item-unread { background: var(--orange); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 700; }
.channel-item-preview { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.channel-item-members { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

.comms-chat { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
.comms-chat-header { padding: 14px 20px; border-bottom: 1px solid transparent; border-image: linear-gradient(90deg, var(--border), rgba(200,135,92,0.15), transparent) 1; display: flex; align-items: center; gap: 12px; background: linear-gradient(180deg, var(--bg-elevated) 0%, var(--bg-elevated) 80%, transparent 100%); position: relative; z-index: 1; }
.comms-chat-name { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.comms-chat-members { font-size: 12px; color: var(--text-muted); }
.comms-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 20px; }
.comms-load-older { text-align: center; padding: 10px; color: var(--text-muted); font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.msg-bubble { display: flex; gap: 10px; align-items: flex-start; padding: 14px 16px; border-radius: var(--radius-md); transition: background 150ms var(--ease); border-left: 2px solid rgba(124,154,110,0.15); }
.msg-bubble:hover { background: rgba(255,255,255,0.015); }
.msg-bubble-ai { background: rgba(200,135,92,0.06); border-left: 3px solid rgba(200,135,92,0.4); box-shadow: inset 0 0 40px rgba(200,135,92,0.02); }
.msg-bubble-ai:hover { background: rgba(200,135,92,0.08); }
.msg-bubble-ai .msg-sender { color: var(--orange) !important; }
.msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; background: #100e0b; border: 2px solid rgba(200,135,92,0.2); }
.msg-body { flex: 1; max-width: 800px; }
.msg-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 2px; }
.msg-sender { font-weight: 600; font-size: 13px; color: var(--text); }
.msg-ai-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px; background: rgba(200,135,92,0.2); color: var(--orange); }
.msg-time { font-size: 11px; color: var(--text-muted); }
.msg-content { font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
.comms-input-bar { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--bg-elevated); }
.comms-input { flex: 1; resize: none; border: 1px solid var(--border); border-radius: 20px; padding: 10px 18px; font-size: 13px; background: var(--bg); color: var(--text); font-family: var(--font); min-height: 42px; max-height: 120px; transition: border-color 200ms var(--ease); }
.comms-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,135,92,0.08); }
.comms-send { background: linear-gradient(135deg, #ffb688, #c8875c); color: #161310; border: none; font-family: var(--font); font-weight: 700; font-size: 13px; padding: 10px 20px; border-radius: 20px; cursor: pointer; transition: all 300ms var(--ease); align-self: flex-end; }
.comms-send:hover { box-shadow: 0 4px 16px rgba(200,135,92,0.3); transform: translateY(-1px); }
.comms-send:active { transform: translateY(0); }
.comms-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text-muted); font-size: 14px; }

/* DRAWER */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 200; opacity: 0; transition: opacity 250ms var(--ease); pointer-events: none; }
.overlay.open { opacity: 1; pointer-events: all; }
.drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 440px; max-width: 100%; background: var(--bg-elevated); border-left: 1px solid var(--border); z-index: 201; transform: translateX(100%); transition: transform 250ms var(--ease); overflow-y: auto; }
.drawer.open { transform: translateX(0); }
.drawer-strip { height: 4px; background: linear-gradient(90deg, var(--accent), var(--tan), var(--accent)); opacity: 0.7; }
.drawer-inner { padding: 24px; }
.drawer-close { position: absolute; top: 20px; right: 16px; background: none; border: 1px solid var(--border); color: var(--text-secondary); font-size: 16px; cursor: pointer; width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; transition: all 300ms var(--ease); z-index: 1; }
.drawer-close:hover { background: rgba(200,135,92,0.1); color: var(--text); border-color: var(--accent); }
.drawer-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; padding-right: 44px; line-height: 1.3; }
.drawer-section { margin-bottom: 24px; }
.drawer-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 10px; }
.drawer-objective { background: rgba(200,135,92,0.04); border: 1px solid rgba(200,135,92,0.1); border-radius: var(--radius-md); padding: 16px; margin-bottom: 16px; }
.drawer-objective-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 8px; }
.drawer-objective-text { font-size: 14px; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
.status-row, .priority-row { display: flex; flex-wrap: wrap; gap: 6px; }
.status-btn { cursor: pointer; transition: all 300ms var(--ease); }
.status-btn:hover { opacity: 0.8; transform: scale(1.05); }
.status-btn.current { box-shadow: 0 0 0 2px var(--accent); }
.pri-btn { display: inline-flex; align-items: center; justify-content: center; padding: 4px 12px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 2px solid transparent; transition: all 300ms var(--ease); }
.pri-btn:hover { transform: scale(1.08); }
.pri-btn.current { border-color: var(--text); box-shadow: 0 0 0 3px rgba(232,224,212,0.1); }
.meta-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px 16px; font-size: 13px; }
.meta-key { color: var(--text-muted); }
.meta-val { color: var(--text); display: flex; align-items: center; gap: 6px; }
.meta-val.mono { font-family: var(--mono); font-size: 12px; background: rgba(255,255,255,0.04); padding: 2px 8px; border-radius: 4px; }
.approve-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-approve { background: var(--green); color: #161310; border: none; font-family: var(--font); font-weight: 700; font-size: 13px; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; flex: 1; transition: all 300ms var(--ease); }
.btn-approve:hover { box-shadow: 0 4px 12px rgba(124,154,110,0.3); }
.btn-changes { background: transparent; color: var(--red); border: 1px solid var(--red); font-family: var(--font); font-weight: 600; font-size: 13px; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; flex: 1; transition: all 300ms var(--ease); }
.btn-changes:hover { background: var(--red-bg); }

.comment { margin-bottom: 12px; padding: 12px 14px; background: rgba(255,255,255,0.02); border-radius: var(--radius-md); }
.comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.comment-author { font-size: 13px; font-weight: 700; }
.comment-time { font-size: 12px; color: var(--text-muted); }
.comment-body { font-size: 13px; color: var(--text-secondary); white-space: pre-wrap; line-height: 1.6; }
.comment-input-row { display: flex; gap: 8px; margin-top: 12px; }
.comment-input-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 10px 14px; font-family: var(--font); font-size: 13px; }
.comment-input-row input:focus { outline: none; border-color: var(--accent); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 200ms var(--ease); }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 0; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 48px rgba(0,0,0,0.5); transform: scale(0.95); opacity: 0; transition: transform 200ms var(--spring), opacity 200ms var(--ease); }
.modal-overlay.open .modal { transform: scale(1); opacity: 1; }
.modal-strip { height: 4px; background: linear-gradient(90deg, var(--accent), var(--tan), var(--accent)); opacity: 0.7; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.modal-inner { padding: 28px; }
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; color: var(--tan); }
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 8px; }
.form-input, .form-textarea, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 10px 14px; font-family: var(--font); font-size: 14px; transition: all 200ms var(--ease); }
.form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,135,92,0.08); }
.form-textarea { min-height: 80px; resize: vertical; }
.form-input.error { border-color: var(--red); }
.form-select option { background: var(--card); }
.pri-selector { display: flex; gap: 8px; }
.pri-opt { padding: 6px 14px; border-radius: 4px; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 10px; cursor: pointer; text-transform: uppercase; transition: all 300ms var(--ease); }
.pri-opt:hover { transform: scale(1.08); }
.pri-opt.selected { border-color: var(--text); box-shadow: 0 0 0 3px rgba(232,224,212,0.1); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 28px; }
.btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-secondary); font-family: var(--font); font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; transition: all 300ms var(--ease); }
.btn-cancel:hover { border-color: var(--border-hover); color: var(--text); }
.btn-create { background: linear-gradient(135deg, #ffb688, #c8875c); color: #161310; border: none; font-family: var(--font); font-weight: 700; font-size: 13px; padding: 10px 28px; border-radius: var(--radius-sm); cursor: pointer; transition: all 300ms var(--ease); }
.btn-create:hover { box-shadow: 0 4px 16px rgba(200,135,92,0.3); }
.btn-sm { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-secondary); font-family: var(--font); font-size: 12px; padding: 6px 16px; border-radius: var(--radius-sm); cursor: pointer; transition: all 300ms var(--ease); font-weight: 600; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); background: var(--orange-bg); }

.empty-text { text-align: center; padding: 24px; color: var(--text-muted); font-size: 13px; }

/* SPRINT SCOREBOARD / HALL OF FAME */
.hof-header { text-align: center; margin-bottom: 36px; }
.hof-title { font-size: 36px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(135deg, #ffb688 0%, var(--accent) 40%, var(--tan) 70%, #ffb688 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
.hof-subtitle { font-size: 13px; color: var(--text-muted); letter-spacing: 1px; }
.hof-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
.hof-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: all 300ms var(--ease); position: relative; animation: cardEntrance 400ms var(--ease) backwards; }
.hof-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--border-hover); }
.hof-card-banner { height: 6px; background: linear-gradient(90deg, var(--green), var(--tan), var(--accent)); }
.hof-card-inner { padding: 24px; }
.hof-card-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
.hof-trophy { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; background: linear-gradient(135deg, rgba(191,168,122,0.1) 0%, rgba(200,135,92,0.06) 100%); border: 1px solid rgba(191,168,122,0.15); flex-shrink: 0; }
.hof-card-info { flex: 1; }
.hof-card-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
.hof-card-date { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.hof-card-date::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }
.hof-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.hof-stat { background: rgba(255,255,255,0.02); border-radius: var(--radius-md); padding: 14px; text-align: center; }
.hof-stat-val { font-size: 26px; font-weight: 900; color: var(--tan); line-height: 1; margin-bottom: 4px; }
.hof-stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
.hof-bar-wrap { background: rgba(255,255,255,0.04); border-radius: 6px; height: 8px; overflow: hidden; margin-bottom: 14px; }
.hof-bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, var(--green), #8aad7a, var(--green)); background-size: 200% 100%; transition: width 800ms var(--ease); animation: shimmer 4s ease infinite; }
.hof-categories { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.hof-cat-chip { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 10px; border-radius: 10px; background: rgba(255,255,255,0.03); color: var(--text-secondary); }
.hof-contributors { display: flex; gap: 4px; align-items: center; }
.hof-contributor { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #100e0b; border: 2px solid rgba(200,135,92,0.2); }
.hof-empty { text-align: center; padding: 60px 20px; }
.hof-empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.hof-empty-text { font-size: 15px; color: var(--text-muted); }

/* BILLING */
.billing-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.billing-title { font-size: 24px; font-weight: 800; color: var(--tan); letter-spacing: 1px; }
.billing-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.billing-category { margin-bottom: 20px; animation: cardEntrance 300ms var(--ease) backwards; }
.billing-cat-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--card); border-radius: var(--radius-md); cursor: pointer; transition: all 300ms var(--ease); user-select: none; }
.billing-cat-header:hover { background: var(--card-hover); }
.billing-cat-arrow { font-size: 12px; color: var(--text-muted); transition: transform 200ms var(--ease); }
.billing-cat-arrow.open { transform: rotate(90deg); }
.billing-cat-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); flex: 1; }
.billing-cat-count { font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.04); color: var(--text-muted); padding: 2px 10px; border-radius: 10px; }
.billing-cat-body { padding: 10px 0 0 0; }
.billing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.billing-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 18px; transition: all 300ms var(--ease); display: flex; flex-direction: column; gap: 10px; }
.billing-card:hover { border-color: var(--border-hover); transform: translateY(-4px); box-shadow: var(--shadow-hover); }
.billing-card-top { display: flex; align-items: center; gap: 10px; }
.billing-card-name { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
.billing-card-actions { display: flex; gap: 6px; }
.billing-status { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.billing-status-active { background: var(--green-bg); color: var(--green); }
.billing-status-needs_update { background: var(--orange-bg); color: var(--orange); }
.billing-status-overdue { background: var(--red-bg); color: var(--red); }
.billing-status-unused { background: rgba(109,99,88,0.08); color: var(--text-muted); }
.billing-status-cancelled { background: rgba(109,99,88,0.06); color: var(--text-muted); text-decoration: line-through; }
.billing-status-unknown { background: rgba(109,99,88,0.08); color: var(--text-muted); }
.billing-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-secondary); }
.billing-meta-item { display: flex; align-items: center; gap: 4px; }
.billing-meta-label { color: var(--text-muted); }
.billing-notes { font-size: 12px; color: var(--text-muted); font-style: italic; line-height: 1.5; }
.billing-link-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--accent); background: rgba(200,135,92,0.06); border: 1px solid rgba(200,135,92,0.12); padding: 3px 10px; border-radius: var(--radius-sm); text-decoration: none; transition: all 300ms var(--ease); }
.billing-link-btn:hover { background: rgba(200,135,92,0.15); border-color: var(--accent); }
.billing-burn-banner { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px 32px; margin-bottom: 28px; display: flex; align-items: center; gap: 32px; position: relative; overflow: hidden; }
.billing-burn-banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--accent), var(--tan), var(--accent), transparent); opacity: 0.6; }
.billing-burn-icon { font-size: 28px; flex-shrink: 0; }
.billing-burn-primary { display: flex; flex-direction: column; gap: 2px; }
.billing-burn-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); }
.billing-burn-amount { font-size: 36px; font-weight: 900; color: var(--tan); letter-spacing: -0.5px; line-height: 1.1; }
.billing-burn-secondary { display: flex; flex-direction: column; gap: 2px; padding-left: 32px; border-left: 1px solid var(--border); }
.billing-burn-secondary .billing-burn-amount { font-size: 22px; color: var(--text-secondary); font-weight: 800; }
.billing-burn-secondary .billing-burn-label { color: var(--text-muted); font-size: 10px; }
.btn-edit-service { background: none; border: 1px solid var(--border); color: var(--text-muted); width: 26px; height: 26px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all 300ms var(--ease); }
.btn-edit-service:hover { border-color: var(--accent); color: var(--accent); background: var(--orange-bg); }

/* Usage Dashboard */
.usage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.usage-title { font-size: 24px; font-weight: 800; color: var(--tan); letter-spacing: -0.5px; }

function renderMarkdownSafe(text) {
  // Safe markdown: renders **bold**, *italic*, `code`, and newlines using DOM nodes
  var frag = document.createDocumentFragment();
  var lines = (text || '').split('\n');
  for (var li = 0; li < lines.length; li++) {
    if (li > 0) frag.appendChild(document.createElement('br'));
    var line = lines[li];
    // Split on **bold**, *italic*, `code` patterns
    var parts = line.split(/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g);
    for (var pi = 0; pi < parts.length; pi++) {
      var p = parts[pi];
      if (p.indexOf('**') === 0 && p.lastIndexOf('**') === p.length - 2) {
        var b = document.createElement('strong');
        b.style.color = 'var(--text)';
        b.style.fontWeight = '700';
        b.textContent = p.slice(2, -2);
        frag.appendChild(b);
      } else if (p.indexOf('`') === 0 && p.lastIndexOf('`') === p.length - 1) {
        var code = document.createElement('code');
        code.style.cssText = 'background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:4px;font-family:var(--mono);font-size:12px;color:var(--tan)';
        code.textContent = p.slice(1, -1);
        frag.appendChild(code);
      } else if (p.indexOf('*') === 0 && p.lastIndexOf('*') === p.length - 1 && p.length > 2) {
        var em = document.createElement('em');
        em.style.color = 'var(--text-secondary)';
        em.textContent = p.slice(1, -1);
        frag.appendChild(em);
      } else {
        frag.appendChild(document.createTextNode(p));
      }
    }
  }
  return frag;
}

function makeRank(p) { p = p || 3; return el('span', { className: 'rank-badge rank-' + p }, RANK_LABELS[p] || 'NORMAL'); }
function relTime(d) { if (!d) return ''; var diff = (Date.now() - new Date(d).getTime()) / 1000; if (diff < 60) return 'just now'; if (diff < 3600) return Math.floor(diff / 60) + 'm ago'; if (diff < 86400) return Math.floor(diff / 3600) + 'h ago'; if (diff < 604800) return Math.floor(diff / 86400) + 'd ago'; return new Date(d).toLocaleDateString(); }

function loadChannelMessages() {
  // Load messages per channel so no channel gets starved
  return API.get('/api/channels').then(function(d) {
    var channels = d && d.channels ? d.channels : [];
    S.channels = channels;
    var fetches = channels.map(function(ch) {
      return API.get('/api/messages?channel_id=' + ch.id + '&limit=50&sort=desc&for=' + encodeURIComponent(S.user || ''));
    });
    return Promise.all(fetches).then(function(results) {
      var allMsgs = [];
      var hasMore = false;
      for (var i = 0; i < results.length; i++) {
        var msgs = results[i] && results[i].messages ? results[i].messages : [];
        if (msgs.length >= 50) hasMore = true;
        allMsgs = allMsgs.concat(msgs);
      }
      allMsgs.sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });
      S.messages = allMsgs;
      S.commsHasMore = hasMore;
    });
  });
}

function loadAll() {
  return Promise.all([
    API.get('/api/overview').then(function(d) { S.overview = d; }),
    API.get('/api/tasks' + (S.selectedSprintId ? '?sprint_id=' + S.selectedSprintId : '')).then(function(d) { S.tasks = d && d.tasks ? d.tasks : []; }),
    API.get('/api/sprints').then(function(d) { S.sprints = d && d.sprints ? d.sprints : []; }),
    API.get('/api/activity?limit=15').then(function(d) { S.activity = d && d.activity ? d.activity : []; }),
    loadChannelMessages(),
    API.get('/api/heartbeat').then(function(d) { S.heartbeats = d && d.agents ? d.agents : {}; }),
    API.get('/api/services').then(function(d) { S.services = d && d.services ? d.services : []; }),
    API.get('/api/usage/summary?days=' + S.usageDays).then(function(d) { S.usageSummary = d && d.summary ? d.summary : []; }),
    API.get('/api/usage?days=' + S.usageDays + '&limit=50').then(function(d) { S.usageReports = d && d.reports ? d.reports : []; })
  ]).then(function() {
    S.totalUnread = 0;
    var me = (S.user || '').toLowerCase();
    for (var i = 0; i < S.messages.length; i++) {
      var m = S.messages[i];
      if (!m.read_by_me && m.sender.toLowerCase() !== me) {
        if (m.channel_id) {
          var ch = S.channels.find(function(c) { return c.id === m.channel_id; });
          if (ch) {
            var members = typeof ch.members === 'string' ? JSON.parse(ch.members) : ch.members;
            var chHumans = members.filter(function(mem) { return HUMANS.indexOf(mem.toLowerCase()) !== -1; });
            var amHuman = HUMANS.indexOf(me) !== -1;
            var amMember = members.some(function(mem) { return mem.toLowerCase() === me; });
            var canSee = amHuman ? (chHumans.length === 0 || amMember) : amMember;
            if (canSee) S.totalUnread++;
          }
        }
        // DMs (no channel_id) excluded from badge — no DM view in UI
      }
    }
  });
}

function renderLogin() {
  var app = document.getElementById('app');
  var screen = el('div', { className: 'login-screen' });
  screen.appendChild(el('img', { className: 'login-logo', src: '/logo.png', alt: 'BMP' }));
  screen.appendChild(el('div', { className: 'login-title' }, 'Command Center'));
  var card = el('div', { className: 'login-card' });
  card.appendChild(el('h2', null, 'Sign In'));
  var fieldUser = el('div', { className: 'login-field' });
  fieldUser.appendChild(el('label', { className: 'login-label' }, 'Who are you?'));
  var sel = el('select', { className: 'login-select', id: 'login-user' });
  sel.appendChild(el('option', { value: 'Will' }, 'Will'));
  sel.appendChild(el('option', { value: 'Mike' }, 'Mike'));
  fieldUser.appendChild(sel);
  card.appendChild(fieldUser);
  var fieldPin = el('div', { className: 'login-field' });
  fieldPin.appendChild(el('label', { className: 'login-label' }, 'PIN'));

  card.appendChild(fieldPin);
  var errEl = el('div', { className: 'login-error', id: 'login-error' });
  card.appendChild(errEl);

  function doLogin() {
    var username = document.getElementById('login-user').value;
    var pin = document.getElementById('login-pin').value;
    if (!pin) { document.getElementById('login-error').textContent = 'Enter your PIN'; return; }
    fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: username, pin: pin }) })
      .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
      .then(function(res) {
        if (!res.ok) { document.getElementById('login-error').textContent = 'Invalid PIN'; return; }
        S.sessionToken = res.data.token;
        S.user = res.data.user;
        S.authed = true;
        localStorage.setItem('cc_session_token', res.data.token);
        localStorage.setItem('cc_session_user', res.data.user);
        loadAll().then(function() { S.loading = false; render(); });
      });
  }

  card.appendChild(el('button', { className: 'login-btn', onClick: doLogin }, 'Enter Command Center'));
  screen.appendChild(card);
  app.replaceChildren(screen);
  setTimeout(function() {
    var pinInput = document.getElementById('login-pin');
    if (pinInput) pinInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  }, 50);
}
