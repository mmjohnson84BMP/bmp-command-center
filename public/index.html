          catRow.appendChild(el('span', { className: 'hof-cat-chip' }, cat + ' (' + sp.by_category[cat] + ')'));
        });
        inner.appendChild(catRow);
      }

      var contribs = sp.contributors || [];
      if (contribs.length) {
        var contribRow = el('div', { className: 'hof-contributors' });
        contribs.forEach(function(c) {
          var contribAvatar = makeAvatarEl(c, 'sm');
          contribAvatar.setAttribute('data-tooltip', c);
          contribRow.appendChild(contribAvatar);
        });
        inner.appendChild(contribRow);
      }

      card.appendChild(inner);
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
    main.replaceChildren(wrap);
  });

  main.replaceChildren(wrap);
}

var BILLING_CATEGORIES = ['Video Gen', 'Image Gen', 'Narration/Music', 'Infrastructure', 'AI/Dev Tools', 'Distribution'];
var BILLING_STATUS_LABELS = { active: 'Active', needs_update: 'Needs Update', overdue: 'Overdue', unused: 'Unused', cancelled: 'Cancelled', unknown: 'Unknown' };
var BILLING_CAT_ICONS = { 'Video Gen': '\uD83C\uDFAC', 'Image Gen': '\uD83D\uDDBC\uFE0F', 'Narration/Music': '\uD83C\uDFB5', 'Infrastructure': '\u2699\uFE0F', 'AI/Dev Tools': '\uD83E\uDD16', 'Distribution': '\uD83D\uDCE1' };

function openServiceModal(service) {
  S.serviceModal = true;
  S.editingServiceId = service ? service.id : null;
  var overlay = document.getElementById('modal-overlay');
  var modal = document.getElementById('modal');
  overlay.classList.add('open');
  clearChildren(modal);
  modal.appendChild(el('div', { className: 'modal-strip' }));
  var inner = el('div', { className: 'modal-inner' });
  inner.appendChild(el('div', { className: 'modal-title' }, service ? 'Edit Service' : 'Add Service'));

  var fields = [
    { key: 'name', label: 'Service Name', type: 'input', required: true },
    { key: 'category', label: 'Category', type: 'select', options: BILLING_CATEGORIES },
    { key: 'status', label: 'Status', type: 'select', options: ['active', 'needs_update', 'overdue', 'unused', 'cancelled', 'unknown'] },
    { key: 'payment_method', label: 'Payment Method', type: 'input', placeholder: "e.g. Will's card" },
    { key: 'monthly_cost', label: 'Monthly Cost', type: 'input', placeholder: 'e.g. ~$20/mo' },
    { key: 'balance', label: 'Balance / Credits', type: 'input', placeholder: 'e.g. $50 remaining' },
    { key: 'billing_url', label: 'Billing URL', type: 'input', placeholder: 'https://...' },
    { key: 'logo_url', label: 'Logo URL', type: 'input', placeholder: 'https://...' },
    { key: 'notes', label: 'Notes', type: 'textarea' }
  ];

  var inputs = {};
  for (var fi = 0; fi < fields.length; fi++) {
    var f = fields[fi];
    var group = el('div', { className: 'form-group' });
    group.appendChild(el('label', { className: 'form-label' }, f.label));
    var inp;
    if (f.type === 'select') {
      inp = el('select', { className: 'form-select' });
      for (var oi = 0; oi < f.options.length; oi++) {
        var opt = el('option', { value: f.options[oi] }, f.options[oi]);
        inp.appendChild(opt);
      }
      if (service && service[f.key]) inp.value = service[f.key];
    } else if (f.type === 'textarea') {
      inp = el('textarea', { className: 'form-textarea', placeholder: f.placeholder || '' });
      if (service && service[f.key]) inp.value = service[f.key];
    } else {
      inp = el('input', { className: 'form-input', type: 'text', placeholder: f.placeholder || '' });
      if (service && service[f.key]) inp.value = service[f.key];
    }
    inputs[f.key] = inp;
    group.appendChild(inp);
    inner.appendChild(group);
  }

  var actions = el('div', { className: 'modal-actions' });

  if (service) {
    var delBtn = el('button', { className: 'btn-cancel', style: { color: 'var(--red)', borderColor: 'var(--red)' }, onClick: function() {
      if (!confirm('Delete ' + service.name + '?')) return;
      API.del('/api/services/' + service.id).then(function(ok) {
        if (ok) { toast('Service deleted'); closeServiceModal(); API.get('/api/services').then(function(d) { S.services = d && d.services ? d.services : []; render(); }); }
        else toast('Delete failed', 'error');
      });
    } }, 'Delete');
    actions.appendChild(delBtn);
  }

  actions.appendChild(el('button', { className: 'btn-cancel', onClick: closeServiceModal }, 'Cancel'));
  actions.appendChild(el('button', { className: 'btn-create', onClick: function() {
    var name = inputs.name.value.trim();
    if (!name) { inputs.name.classList.add('error'); return; }
    var body = {};
    var fieldKeys = Object.keys(inputs);
    for (var ki = 0; ki < fieldKeys.length; ki++) {
      var val = inputs[fieldKeys[ki]].value.trim();
      if (val) body[fieldKeys[ki]] = val;
    }
    if (!body.category) body.category = BILLING_CATEGORIES[0];
    var promise = service
      ? API.patch('/api/services/' + service.id, body)
      : API.post('/api/services', body);
    promise.then(function(d) {
      if (d) { toast(service ? 'Service updated' : 'Service added'); closeServiceModal(); API.get('/api/services').then(function(r) { S.services = r && r.services ? r.services : []; render(); }); }
      else toast('Save failed', 'error');
    });
  } }, service ? 'Save Changes' : 'Add Service'));

  inner.appendChild(actions);
  modal.appendChild(inner);
}

function closeServiceModal() {
  S.serviceModal = false;
  S.editingServiceId = null;
  document.getElementById('modal-overlay').classList.remove('open');
}

function renderBilling(main) {
  var wrap = el('div', { className: 'view-enter' });
  var header = el('div', { className: 'billing-header' });
  var headerLeft = el('div');
  headerLeft.appendChild(el('div', { className: 'billing-title' }, 'Billing & Connections'));
  headerLeft.appendChild(el('div', { className: 'billing-subtitle' }, 'All active services, subscriptions, and tools'));
  header.appendChild(headerLeft);
  header.appendChild(el('button', { className: 'btn-new-task', onClick: function() { openServiceModal(null); } }, '+ Add Service'));
  wrap.appendChild(header);

  // Monthly burn summary banner
  var totalBurn = 0;
  var replitBurn = 0;
  for (var bi = 0; bi < S.services.length; bi++) {
    var cost = S.services[bi].monthly_cost;
    if (!cost) continue;
    var parsed = 0;
    // Try to extract dollar amount — handle ranges like "$300-400" (use midpoint)
    var rangeMatch = cost.match(/\$\s*([\d,]+(?:\.\d+)?)\s*[-\u2013]\s*([\d,]+(?:\.\d+)?)/);
    if (rangeMatch) {
      var lo = parseFloat(rangeMatch[1].replace(/,/g, ''));
      var hi = parseFloat(rangeMatch[2].replace(/,/g, ''));
      parsed = (lo + hi) / 2;
    } else {
      // First dollar amount in the string
      var dollarMatch = cost.match(/\$\s*([\d,]+(?:\.\d+)?)/);
      if (dollarMatch) {
        parsed = parseFloat(dollarMatch[1].replace(/,/g, ''));
      }
    }
    // Handle yearly amounts — convert to monthly
    if (parsed > 0 && /\/yr/i.test(cost) && !/\/mo/i.test(cost.split('/yr')[0])) {
      parsed = parsed / 12;
    }
    totalBurn += parsed;
    if (S.services[bi].name && /replit/i.test(S.services[bi].name)) {
      replitBurn += parsed;
    }
  }
  if (totalBurn > 0) {
    var banner = el('div', { className: 'billing-burn-banner' });
    banner.appendChild(el('span', { className: 'billing-burn-icon' }, '\uD83D\uDD25'));
    var primary = el('div', { className: 'billing-burn-primary' });
    primary.appendChild(el('div', { className: 'billing-burn-label' }, 'Total Monthly Burn'));
    primary.appendChild(el('div', { className: 'billing-burn-amount' }, '$' + Math.round(totalBurn).toLocaleString() + '/mo'));
    banner.appendChild(primary);
    if (replitBurn > 0) {
      var secondary = el('div', { className: 'billing-burn-secondary' });
      secondary.appendChild(el('div', { className: 'billing-burn-label' }, 'Without Replit'));
      secondary.appendChild(el('div', { className: 'billing-burn-amount' }, '$' + Math.round(totalBurn - replitBurn).toLocaleString() + '/mo'));
      banner.appendChild(secondary);
    }
    wrap.appendChild(banner);
  }

  // Group services by category
  var byCategory = {};
  for (var si = 0; si < S.services.length; si++) {
    var svc = S.services[si];
    if (!byCategory[svc.category]) byCategory[svc.category] = [];
    byCategory[svc.category].push(svc);
  }

  for (var ci = 0; ci < BILLING_CATEGORIES.length; ci++) {
    var cat = BILLING_CATEGORIES[ci];
    var items = byCategory[cat];
    if (!items || !items.length) continue;

    var isCollapsed = S.billingCollapsed[cat] === true;
    var section = el('div', { className: 'billing-category', style: { animationDelay: (ci * 60) + 'ms' } });

    (function(cat, items, isCollapsed) {
      var catHeader = el('div', { className: 'billing-cat-header', onClick: function() {
        S.billingCollapsed[cat] = !S.billingCollapsed[cat];
        render();
      } });
      catHeader.appendChild(el('span', { className: 'billing-cat-arrow' + (isCollapsed ? '' : ' open') }, '\u25B6'));
      catHeader.appendChild(el('span', { style: { fontSize: '16px' } }, BILLING_CAT_ICONS[cat] || '\uD83D\uDCE6'));
      catHeader.appendChild(el('span', { className: 'billing-cat-name' }, cat));
      catHeader.appendChild(el('span', { className: 'billing-cat-count' }, String(items.length) + (items.length === 1 ? ' service' : ' services')));
      section.appendChild(catHeader);

      if (!isCollapsed) {
        var body = el('div', { className: 'billing-cat-body' });
        var grid = el('div', { className: 'billing-grid' });

        for (var ii = 0; ii < items.length; ii++) {
          (function(svc) {
            var card = el('div', { className: 'billing-card' });

            // Top row: name + status + edit
            var top = el('div', { className: 'billing-card-top' });
            top.appendChild(el('span', { className: 'billing-card-name' }, svc.name));
            var statusClass = 'billing-status billing-status-' + (svc.status || 'active');
            top.appendChild(el('span', { className: statusClass }, BILLING_STATUS_LABELS[svc.status] || svc.status));
            var actionsDiv = el('div', { className: 'billing-card-actions' });
            actionsDiv.appendChild(el('button', { className: 'btn-edit-service', 'data-tooltip': 'Edit', onClick: function() { openServiceModal(svc); } }, '\u270E'));
            top.appendChild(actionsDiv);
            card.appendChild(top);

            // Meta row
            var meta = el('div', { className: 'billing-meta' });
            if (svc.payment_method) {
              var pm = el('span', { className: 'billing-meta-item' });
              pm.appendChild(el('span', { className: 'billing-meta-label' }, '\uD83D\uDCB3'));
              pm.appendChild(el('span', null, svc.payment_method));
              meta.appendChild(pm);
            }
            if (svc.monthly_cost) {
              var mc = el('span', { className: 'billing-meta-item' });
              mc.appendChild(el('span', { className: 'billing-meta-label' }, '\uD83D\uDCB0'));
              mc.appendChild(el('span', null, svc.monthly_cost));
              meta.appendChild(mc);
            }
            if (svc.balance) {
              var bal = el('span', { className: 'billing-meta-item' });
              bal.appendChild(el('span', { className: 'billing-meta-label' }, '\uD83C\uDFE6'));
              bal.appendChild(el('span', null, svc.balance));
              meta.appendChild(bal);
            }
            if (meta.childNodes.length) card.appendChild(meta);

            // Notes
            if (svc.notes) {
              card.appendChild(el('div', { className: 'billing-notes' }, svc.notes));
            }

            // Billing link
            if (svc.billing_url) {
              card.appendChild(el('a', { className: 'billing-link-btn', href: svc.billing_url, target: '_blank', rel: 'noopener' }, '\u2197 Open Billing'));
            }

            grid.appendChild(card);
          })(items[ii]);
        }

        body.appendChild(grid);
        section.appendChild(body);
      }
    })(cat, items, isCollapsed);

    wrap.appendChild(section);
  }

  if (!S.services.length) {
    var empty = el('div', { className: 'hof-empty' });
    empty.appendChild(el('div', { className: 'hof-empty-icon' }, '\uD83D\uDCB3'));
    empty.appendChild(el('div', { className: 'hof-empty-text' }, 'No services tracked yet. Add your first service to get started.'));
    wrap.appendChild(empty);
  }

  main.replaceChildren(wrap);
}

function renderUsage(main) {
  var wrap = el('div', { className: 'view-enter' });

  // Load calibration + dashboard data if not loaded
  if (!S.calibration) {
    API.get('/api/usage/calibrate').then(function(d) { S.calibration = d && d.calibration ? d.calibration : {}; renderUsage(main); });
  }
  if (!S.usageDashboard) {
    API.get('/api/usage/dashboard?days=30').then(function(d) { S.usageDashboard = d; renderUsage(main); });
  }

  var header = el('div', { className: 'usage-header' });
  var headerLeft = el('div');
  headerLeft.appendChild(el('div', { className: 'usage-title' }, 'Usage Dashboard'));
  headerLeft.appendChild(el('div', { className: 'usage-subtitle' }, 'Teams Plan / Terminal Sessions / API Billing'));
  // Anthropic sync button
  var syncBtn = el('button', { className: 'btn', style: { marginLeft: '12px', fontSize: '12px', padding: '4px 12px' }, onClick: function() {
    syncBtn.textContent = 'Syncing...';
    API.get('/api/usage/sync?days=' + (S.usageDays || 7)).then(function(d) {
      if (d && d.error) { syncBtn.textContent = 'Sync failed: ' + d.error; return; }
      S.anthropicUsage = d;
      syncBtn.textContent = 'Synced';
      renderUsage(main);
    }).catch(function() { syncBtn.textContent = 'Sync failed'; });
  }}, 'Sync Anthropic API');
  headerLeft.appendChild(syncBtn);
  header.appendChild(headerLeft);
  var periodSel = el('select', { className: 'usage-period-select', onChange: function(e) {
    S.usageDays = parseInt(e.target.value);
    Promise.all([
      API.get('/api/usage/summary?days=' + S.usageDays).then(function(d) { S.usageSummary = d && d.summary ? d.summary : []; }),
      API.get('/api/usage?days=' + S.usageDays + '&limit=50').then(function(d) { S.usageReports = d && d.reports ? d.reports : []; }),
      API.get('/api/usage/teams-plan').then(function(d) { S.teamsPlan = d; })
    ]).then(function() { renderUsage(main); });
  }});
  var periods = [{ v: 1, l: 'Last 24h' }, { v: 7, l: 'Last 7 days' }, { v: 14, l: 'Last 14 days' }, { v: 30, l: 'Last 30 days' }];
  for (var pi = 0; pi < periods.length; pi++) {
    var opt = el('option', { value: String(periods[pi].v) }, periods[pi].l);
    if (periods[pi].v === S.usageDays) opt.selected = true;
    periodSel.appendChild(opt);
  }
  header.appendChild(periodSel);
  wrap.appendChild(header);

  // Load teams plan if not loaded
  if (!S.teamsPlan) {
    API.get('/api/usage/teams-plan').then(function(d) { S.teamsPlan = d; renderUsage(main); });
  }

  var AGENT_META = {
    titus: { icon: '\u2694\uFE0F', color: 'var(--orange)', label: 'Titus' },
    socrates: { icon: '\uD83E\uDDD9', color: 'var(--green)', label: 'Socrates' },
    atlas: { icon: '\uD83E\uDDED', color: 'var(--slate)', label: 'Atlas' },
    davinci: { icon: '\uD83C\uDFA8', color: 'var(--purple)', label: 'Da Vinci' },
    kubrick: { icon: '\uD83C\uDFAC', color: 'var(--tan)', label: 'Kubrick' },
    forge: { icon: '\uD83D\uDD25', color: 'var(--red)', label: 'Forge' }
  };

  function fmtTokens(n) {
    n = parseInt(n) || 0;
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
  }
  function fmtCost(n) { return '$' + (parseFloat(n) || 0).toFixed(2); }
  function fmtDuration(ms) {
    ms = parseInt(ms) || 0;
    if (ms >= 60000) return (ms / 60000).toFixed(1) + 'm';
    return (ms / 1000).toFixed(0) + 's';
  }

  function createStat(label, value, cls) {
    var stat = el('div', { className: 'usage-stat' });
    stat.appendChild(el('div', { className: 'usage-stat-label' }, label));
    stat.appendChild(el('div', { className: 'usage-stat-value' + (cls ? ' ' + cls : '') }, value));
    return stat;
  }
  function createLegend(label, color) {
    var item = el('div', { className: 'usage-legend-item' });
    item.appendChild(el('div', { className: 'usage-legend-dot', style: { background: color } }));
    item.appendChild(el('span', null, label));
    return item;
  }
  function createGaugeStat(label, value, cls) {
    var stat = el('div', { className: 'teams-gauge-stat' });
    stat.appendChild(el('div', { className: 'teams-gauge-stat-label' }, label));
    stat.appendChild(el('div', { className: 'teams-gauge-stat-value' + (cls ? ' ' + cls : '') }, value));
    return stat;
  }

  // ════════════════════════════════════════════════
  // QUICK SYNC + HERO GAUGES
  // ════════════════════════════════════════════════
  var cal = S.calibration || { session_budget: 27, weekly_budget: 10, overage_cap: 1000, session_correction_factor: 1, weekly_correction_factor: 1 };
  var dash = S.usageDashboard || { totals: {}, by_seat: [], by_agent: [], daily: [] };
  var dt = dash.totals || {};

  // Quick Sync bar
  var syncBar = el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px', padding: '12px 16px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 'var(--radius-md)' } });
  syncBar.appendChild(el('span', { style: { fontSize: '12px', fontWeight: '700', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '1px' } }, 'Quick Sync'));
  syncBar.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--text-muted)' } }, 'Enter % from /usage:'));
  var syncSessInput = el('input', { type: 'number', placeholder: 'Session %', style: { width: '80px', background: 'var(--bg)', border: '1px solid var(--border)', color: 'var(--text)', borderRadius: '4px', padding: '4px 8px', fontSize: '13px', fontFamily: 'var(--mono)' } });
  var syncWeekInput = el('input', { type: 'number', placeholder: 'Weekly %', style: { width: '80px', background: 'var(--bg)', border: '1px solid var(--border)', color: 'var(--text)', borderRadius: '4px', padding: '4px 8px', fontSize: '13px', fontFamily: 'var(--mono)' } });
  var syncBtn = el('button', { className: 'btn', style: { fontSize: '12px', padding: '4px 12px' }, onClick: function() {
    var sp = parseFloat(syncSessInput.value), wp = parseFloat(syncWeekInput.value);
    if (!sp && !wp) return;
    var body = {};
    if (sp > 0) body.session_pct = sp;
    if (wp > 0) body.weekly_pct = wp;
    syncBtn.textContent = 'Syncing...';
    API.post('/api/usage/calibrate', body).then(function(d) {
      S.calibration = d && d.calibration ? d.calibration : S.calibration;
      syncBtn.textContent = 'Synced';
      renderUsage(main);
    }).catch(function() { syncBtn.textContent = 'Failed'; });
  }}, 'Sync');
  syncBar.appendChild(syncSessInput);
  syncBar.appendChild(syncWeekInput);
  syncBar.appendChild(syncBtn);
  if (cal.last_weekly_pct) {
    syncBar.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--text-muted)', marginLeft: 'auto' } },
      'Last: ' + (cal.session_correction_factor || 1).toFixed(2) + 'x sess / ' + (cal.weekly_correction_factor || 1).toFixed(2) + 'x week'));
  }
  wrap.appendChild(syncBar);

  // 3-column hero gauges
  var heroGrid = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: '24px' } });

  // Compute gauge values
  var totalCost = parseFloat(dt.cost_usd) || 0;
  var sessFactor = parseFloat(cal.session_correction_factor) || 1;
  var weekFactor = parseFloat(cal.weekly_correction_factor) || 1;
  var sessBudget = parseFloat(cal.session_budget) || 27;
  var weekBudget = parseFloat(cal.weekly_budget) || 10;
  var overageCap = parseFloat(cal.overage_cap) || 1000;

  // Get validated overage from teams plan
  var validatedOverage = 0;
  if (S.teamsPlan && S.teamsPlan.plan && S.teamsPlan.plan.validated_spend) {
    validatedOverage = parseFloat(S.teamsPlan.plan.validated_spend) || 0;
  }
  var estimatedOverage = S.teamsPlan && S.teamsPlan.estimated ? parseFloat(S.teamsPlan.estimated.estimated_spend) || 0 : totalCost;

  function makeGaugeCard(title, value, budget, unit, colorClass, subtitle) {
    var card = el('div', { className: 'teams-gauge-hero' + (colorClass === 'red' ? ' warning-red' : colorClass === 'yellow' ? ' warning-yellow' : '') });
    var pct = budget > 0 ? Math.min(100, Math.round(value / budget * 100)) : 0;
    card.appendChild(el('div', { className: 'teams-gauge-title' }, [
      el('span', null, title),
      el('span', { className: 'badge badge-' + (pct > 80 ? 'red' : pct > 50 ? 'yellow' : 'green') }, pct + '%')
    ]));
    card.appendChild(el('div', { className: 'teams-gauge-amount', style: { color: pct > 80 ? 'var(--red)' : pct > 50 ? '#c8af5c' : 'var(--green)' } }, [
      document.createTextNode(fmtCost(value) + ' '),
      el('span', { className: 'limit' }, '/ ' + fmtCost(budget) + (unit ? ' ' + unit : ''))
    ]));
    var gaugeBar = el('div', { className: 'teams-gauge-bar' });
    var fillCls = 'teams-gauge-fill' + (pct > 80 ? ' red' : pct > 50 ? ' yellow' : '');
    gaugeBar.appendChild(el('div', { className: fillCls, style: { width: Math.min(pct, 100) + '%' } }));
    card.appendChild(gaugeBar);
    if (subtitle) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text-muted)', marginTop: '8px' } }, subtitle));
    return card;
  }

  // Session gauge — latest session cost vs session budget
  var latestSessionCost = 0;
  if (S.usageReports.length) latestSessionCost = parseFloat(S.usageReports[0].cost_usd) || 0;
  var adjSessionCost = latestSessionCost * sessFactor;
  heroGrid.appendChild(makeGaugeCard('Current Session', adjSessionCost, sessBudget, '5h window', adjSessionCost/sessBudget > 0.8 ? 'red' : 'green', 'Correction: ' + sessFactor.toFixed(2) + 'x'));

  // Weekly gauge
  var adjWeeklyCost = totalCost * weekFactor;
  var now = new Date();
  var resetDays = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  var resetDayIdx = resetDays.indexOf((cal.reset_day || 'monday').toLowerCase());
  var daysUntilReset = (resetDayIdx - now.getDay() + 7) % 7;
  if (daysUntilReset === 0) daysUntilReset = 7;
  heroGrid.appendChild(makeGaugeCard('Weekly Usage', adjWeeklyCost, weekBudget, 'weekly', adjWeeklyCost/weekBudget > 0.8 ? 'red' : 'green', 'Resets in ' + daysUntilReset + ' days'));

  // Overage cap gauge
  var displayOverage = validatedOverage > 0 ? validatedOverage : estimatedOverage;
  heroGrid.appendChild(makeGaugeCard('Overage Cap', displayOverage, overageCap, 'cap', displayOverage/overageCap > 0.8 ? 'red' : 'yellow',
    validatedOverage > 0 ? 'Validated from billing' : 'Estimated from token cost'));

  wrap.appendChild(heroGrid);

  // Keep teams section for backwards compat but simplify
  var teamsSection = el('div', { className: 'usage-section' });
  var teamsHdr = el('div', { className: 'usage-section-header' });
  teamsHdr.appendChild(el('span', { className: 'section-icon' }, '\uD83C\uDFAF'));
  teamsHdr.appendChild(el('span', null, 'Teams Plan'));
  teamsSection.appendChild(teamsHdr);

  if (S.teamsPlan) {
    var plan = S.teamsPlan.plan || {};
    var est = S.teamsPlan.estimated || {};
    var spendLimit = parseFloat(plan.spend_limit) || 1000;
    var estimatedSpend = parseFloat(est.estimated_spend) || 0;
    var pctUsed = spendLimit > 0 ? (estimatedSpend / spendLimit * 100) : 0;
    var sessionCount = parseInt(est.session_count) || 0;

    var now = new Date();
    var dayOfMonth = now.getDate();
    var daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    var daysLeft = daysInMonth - dayOfMonth;
    var weeksLeft = Math.max(daysLeft / 7, 0.14);
    var burnPerDay = dayOfMonth > 0 ? estimatedSpend / dayOfMonth : 0;
    var projectedMonthEnd = burnPerDay * daysInMonth;
    var weeklyBudgetRemaining = daysLeft > 0 ? (spendLimit - estimatedSpend) / weeksLeft : 0;
    var overageAmount = projectedMonthEnd > spendLimit ? projectedMonthEnd - spendLimit : 0;

    var totalTokensAllSessions = 0;
    var totalHoursEstimate = 0;
    for (var ti = 0; ti < S.usageSummary.length; ti++) {
      totalTokensAllSessions += (parseInt(S.usageSummary[ti].total_input_tokens) || 0) + (parseInt(S.usageSummary[ti].total_output_tokens) || 0);
      totalHoursEstimate += (parseInt(S.usageSummary[ti].avg_duration) || 0) * (parseInt(S.usageSummary[ti].session_count) || 0) / 3600000;
    }
    var fiveHourRate = totalHoursEstimate > 0 ? fmtTokens(Math.round(totalTokensAllSessions / totalHoursEstimate * 5)) : '--';

    var gaugeColor = pctUsed < 60 ? 'green' : (pctUsed < 80 ? 'yellow' : 'red');
    var heroClass = 'teams-gauge-hero' + (gaugeColor === 'yellow' ? ' warning-yellow' : (gaugeColor === 'red' ? ' warning-red' : ''));
    var hero = el('div', { className: heroClass });

    var titleRow = el('div', { className: 'teams-gauge-title' });
    titleRow.appendChild(el('span', null, 'Estimated Monthly Spend'));
    var badgeCls = 'badge badge-' + gaugeColor;
    var badgeText = pctUsed < 60 ? 'ON TRACK' : (pctUsed < 80 ? 'WATCH' : 'DANGER');
    titleRow.appendChild(el('span', { className: badgeCls }, badgeText));
    hero.appendChild(titleRow);

    var amountRow = el('div', { className: 'teams-gauge-amount', style: { color: gaugeColor === 'green' ? 'var(--green)' : (gaugeColor === 'yellow' ? '#c8af5c' : 'var(--red)') } });
    amountRow.appendChild(document.createTextNode(fmtCost(estimatedSpend) + ' '));
    amountRow.appendChild(el('span', { className: 'limit' }, '/ ' + fmtCost(spendLimit) + ' limit'));
    hero.appendChild(amountRow);
    hero.appendChild(el('div', { className: 'teams-gauge-pct', style: { color: gaugeColor === 'green' ? 'var(--green)' : (gaugeColor === 'yellow' ? '#c8af5c' : 'var(--red)') } }, Math.round(pctUsed) + '% used \u00B7 Day ' + dayOfMonth + ' of ' + daysInMonth));

    var gaugeBar = el('div', { className: 'teams-gauge-bar' });
    var fillCls = 'teams-gauge-fill' + (gaugeColor !== 'green' ? ' ' + gaugeColor : '');
    gaugeBar.appendChild(el('div', { className: fillCls, style: { width: Math.min(pctUsed, 100) + '%' } }));
    hero.appendChild(gaugeBar);

    var statsGrid = el('div', { className: 'teams-gauge-stats' });
    statsGrid.appendChild(createGaugeStat('Burn Rate', fmtCost(burnPerDay) + '/day', 'orange'));
    statsGrid.appendChild(createGaugeStat('Projected Month-End', fmtCost(projectedMonthEnd), projectedMonthEnd > spendLimit ? 'red' : 'green'));
    statsGrid.appendChild(createGaugeStat('Weekly Budget Left', fmtCost(Math.max(weeklyBudgetRemaining, 0)), weeklyBudgetRemaining < 0 ? 'red' : ''));
    statsGrid.appendChild(createGaugeStat('5hr Token Rate', fiveHourRate, ''));
    statsGrid.appendChild(createGaugeStat('Sessions (MTD)', String(sessionCount), ''));
    statsGrid.appendChild(createGaugeStat('Seats', String(plan.seats || 2), ''));
    hero.appendChild(statsGrid);

    if (plan.validated_spend) {
      var valLine = el('div', { className: 'teams-validated' });
      var valDate = plan.validated_at ? new Date(plan.validated_at).toLocaleDateString() : 'unknown';
      valLine.appendChild(document.createTextNode('Last validated: '));
      valLine.appendChild(el('strong', null, fmtCost(plan.validated_spend)));
      valLine.appendChild(document.createTextNode(' on ' + valDate));
      hero.appendChild(valLine);
    }

    if (overageAmount > 0) {
      var alertBox = el('div', { className: 'overage-alert' });
      alertBox.appendChild(el('div', { className: 'overage-alert-icon' }, '\u26A0\uFE0F'));
      var alertInner = el('div');
      alertInner.appendChild(el('div', { className: 'overage-alert-text' }, 'PROJECTED OVERAGE'));
      alertInner.appendChild(el('div', { className: 'overage-alert-amount' }, '+' + fmtCost(overageAmount) + ' over limit'));
      alertBox.appendChild(alertInner);
      hero.appendChild(alertBox);
    }

    teamsSection.appendChild(hero);
  } else {
    var tpLoading = el('div', { className: 'hof-empty', style: { padding: '20px' } });
    tpLoading.appendChild(el('div', { className: 'hof-empty-text' }, 'Loading teams plan data...'));
    teamsSection.appendChild(tpLoading);
  }
  wrap.appendChild(teamsSection);

  // ════════════════════════════════════════════════
  // SECTION 2: TERMINAL SESSIONS (self-reported)
  // ════════════════════════════════════════════════
  var termSection = el('div', { className: 'usage-section' });
  var termHdr = el('div', { className: 'usage-section-header' });
  termHdr.appendChild(el('span', { className: 'section-icon' }, '\uD83D\uDDA5\uFE0F'));
  termHdr.appendChild(el('span', null, 'Terminal Agents'));
  termSection.appendChild(termHdr);

  if (S.usageSummary.length > 0) {
    // Cache savings banner
    var totalCacheSaved = 0;
    var totalCost = 0;
    for (var si = 0; si < S.usageSummary.length; si++) {
      var s = S.usageSummary[si];
      totalCost += parseFloat(s.total_cost_usd) || 0;
      totalCacheSaved += parseFloat(s.total_cache_savings) || 0;
    }
    // Fallback: estimate from cache_read tokens if backend hasn't populated cache_savings yet
    if (totalCacheSaved < 0.01) {
      for (var si2 = 0; si2 < S.usageSummary.length; si2++) {
        var cr = parseInt(S.usageSummary[si2].total_cache_read_tokens) || 0;
        totalCacheSaved += (cr / 1000000) * 13.50; // full_rate(15) - cache_rate(1.50) = 13.50 savings per M tokens
      }
    }
    if (totalCost > 0 || totalCacheSaved > 0) {
      var savBanner = el('div', { className: 'usage-savings-banner' });
      savBanner.appendChild(el('span', { className: 'usage-savings-icon' }, '\uD83D\uDCB0'));
      var savLeft = el('div');
      savLeft.appendChild(el('div', { className: 'usage-savings-label' }, 'Terminal Spend (' + S.usageDays + 'd)'));
      savLeft.appendChild(el('div', { className: 'usage-savings-amount', style: { color: 'var(--orange)' } }, fmtCost(totalCost)));
      savBanner.appendChild(savLeft);
      if (totalCacheSaved > 0.01) {
        var savRight = el('div', { style: { marginLeft: '32px' } });
        savRight.appendChild(el('div', { className: 'usage-savings-label' }, 'Cache Savings'));
        savRight.appendChild(el('div', { className: 'usage-savings-amount' }, fmtCost(totalCacheSaved)));
        savBanner.appendChild(savRight);
      }
      termSection.appendChild(savBanner);
    }

    // Seat summary cards
    var seatMap = {};
    for (var si3 = 0; si3 < S.usageSummary.length; si3++) {
      var sg = S.usageSummary[si3];
      var seatKey = sg.seat || 'unknown';
      if (!seatMap[seatKey]) seatMap[seatKey] = { cost: 0, savings: 0, sessions: 0 };
      seatMap[seatKey].cost += parseFloat(sg.total_cost_usd) || 0;
      seatMap[seatKey].savings += parseFloat(sg.total_cache_savings) || 0;
      seatMap[seatKey].sessions += parseInt(sg.session_count) || 0;
    }
    var seatNames = { will: "Will's Seat (Titus + Da Vinci)", mike: "Mike's Seat (Socrates + Atlas)" };
    var seatKeys = Object.keys(seatMap).sort();
    if (seatKeys.length > 0) {
      var seatRow = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(' + Math.min(seatKeys.length, 2) + ', 1fr)', gap: '16px', marginBottom: '16px' } });
      for (var ski = 0; ski < seatKeys.length; ski++) {
        var sk = seatKeys[ski];
        var sd = seatMap[sk];
        var seatCard = el('div', { className: 'usage-agent-card', style: { borderColor: sk === 'will' ? 'rgba(200,135,92,0.4)' : 'rgba(124,154,110,0.4)' } });
        var seatNameRow = el('div', { className: 'usage-agent-name' });
        seatNameRow.appendChild(el('span', { className: 'usage-agent-icon' }, sk === 'will' ? '\uD83D\uDD31' : '\uD83D\uDE80'));
        seatNameRow.appendChild(el('span', null, seatNames[sk] || sk));
        seatCard.appendChild(seatNameRow);
        var seatStats = el('div', { className: 'usage-agent-stats' });
        seatStats.appendChild(createStat('Cost', fmtCost(sd.cost), 'cost'));
        seatStats.appendChild(createStat('Cache Saved', fmtCost(sd.savings), 'green'));
        seatStats.appendChild(createStat('Sessions', String(sd.sessions)));
        seatCard.appendChild(seatStats);
        seatRow.appendChild(seatCard);
      }
      termSection.appendChild(seatRow);
    }

    // Agent cards
    var agentGrid = el('div', { className: 'usage-agent-grid' });
    for (var ai = 0; ai < S.usageSummary.length; ai++) {
      var ag = S.usageSummary[ai];
      var agName = ag.agent || 'unknown';
      var meta = AGENT_META[agName.toLowerCase()] || { icon: '\uD83E\uDD16', color: 'var(--text-muted)', label: agName };
      var card = el('div', { className: 'usage-agent-card' });
      card.setAttribute('data-agent', agName.toLowerCase());

      var nameRow = el('div', { className: 'usage-agent-name' });
      nameRow.appendChild(el('span', { className: 'usage-agent-icon' }, meta.icon));
      nameRow.appendChild(el('span', null, meta.label || agName.charAt(0).toUpperCase() + agName.slice(1)));
      card.appendChild(nameRow);

      var stats = el('div', { className: 'usage-agent-stats' });
      var totalTokens = (parseInt(ag.total_input_tokens) || 0) + (parseInt(ag.total_output_tokens) || 0);
      stats.appendChild(createStat('Total Tokens', fmtTokens(totalTokens)));
      stats.appendChild(createStat('Est. Cost', fmtCost(ag.total_cost_usd), 'cost'));
      stats.appendChild(createStat('Sessions', String(parseInt(ag.session_count) || 0)));
      stats.appendChild(createStat('Avg/Session', fmtCost(ag.avg_cost_per_session), 'cost'));
      stats.appendChild(createStat('Avg Tools', String(parseFloat(ag.avg_tool_calls || 0).toFixed(1))));
      stats.appendChild(createStat('Avg Duration', fmtDuration(ag.avg_duration)));
      card.appendChild(stats);

      var cacheRate = parseFloat(ag.cache_hit_rate) || 0;
      var cacheBar = el('div', { className: 'usage-cache-bar' });
      cacheBar.appendChild(el('div', { className: 'usage-cache-bar-label' }, 'Cache Hit Rate: ' + cacheRate.toFixed(1) + '%'));
      var cacheTrack = el('div', { className: 'usage-cache-track' });
      cacheTrack.appendChild(el('div', { className: 'usage-cache-fill', style: { width: Math.min(cacheRate, 100) + '%' } }));
      cacheBar.appendChild(cacheTrack);
      card.appendChild(cacheBar);

      agentGrid.appendChild(card);
    }
    termSection.appendChild(agentGrid);

    // Token comparison chart
    var chartSection = el('div', { className: 'usage-chart-section' });
    chartSection.appendChild(el('div', { className: 'usage-chart-title' }, 'Token Usage by Agent'));
    var legend = el('div', { className: 'usage-legend' });
    legend.appendChild(createLegend('Input', 'var(--orange)'));
    legend.appendChild(createLegend('Output', 'var(--tan)'));
    legend.appendChild(createLegend('Cache Read', 'var(--green)'));
    chartSection.appendChild(legend);

    var maxTokens = 0;
    for (var ci = 0; ci < S.usageSummary.length; ci++) {
      var r = S.usageSummary[ci];
      var total = (parseInt(r.total_input_tokens) || 0) + (parseInt(r.total_output_tokens) || 0) + (parseInt(r.total_cache_read_tokens) || 0);
      if (total > maxTokens) maxTokens = total;
    }
    for (var ci = 0; ci < S.usageSummary.length; ci++) {
      var r = S.usageSummary[ci];
      var inp = parseInt(r.total_input_tokens) || 0;
      var out = parseInt(r.total_output_tokens) || 0;
      var cch = parseInt(r.total_cache_read_tokens) || 0;
      var total = inp + out + cch;
      var row = el('div', { className: 'usage-bar-row' });
      row.appendChild(el('div', { className: 'usage-bar-agent' }, r.agent));
      var barTrack = el('div', { className: 'usage-bar-track' });
      var barContainer = el('div', { style: { display: 'flex', height: '100%', width: (maxTokens > 0 ? (total / maxTokens * 100) : 0) + '%' } });
      if (inp > 0) barContainer.appendChild(el('div', { className: 'usage-bar-fill input', style: { width: (inp / total * 100) + '%' } }));
      if (out > 0) barContainer.appendChild(el('div', { className: 'usage-bar-fill output', style: { width: (out / total * 100) + '%' } }));
      if (cch > 0) barContainer.appendChild(el('div', { className: 'usage-bar-fill cache', style: { width: (cch / total * 100) + '%' } }));
      barTrack.appendChild(barContainer);
      row.appendChild(barTrack);
      row.appendChild(el('div', { className: 'usage-bar-amount' }, fmtTokens(total)));
      chartSection.appendChild(row);
    }
    termSection.appendChild(chartSection);

    // Session history table
    if (S.usageReports.length > 0) {
      var tableSection = el('div', { className: 'usage-chart-section' });
      tableSection.appendChild(el('div', { className: 'usage-chart-title' }, 'Recent Sessions'));
      var table = el('table', { className: 'usage-table' });
      var thead = el('thead');
      var hrow = el('tr');
      var cols = ['Agent', 'Model', 'Input', 'Output', 'Cache', 'Cost', 'Duration', 'Tools', 'Time'];
      for (var hi = 0; hi < cols.length; hi++) hrow.appendChild(el('th', null, cols[hi]));
      thead.appendChild(hrow);
      table.appendChild(thead);
      var tbody = el('tbody');
      for (var ri = 0; ri < S.usageReports.length; ri++) {
        var rpt = S.usageReports[ri];
        var tr = el('tr');
        var agLow = (rpt.agent || '').toLowerCase();
        var badge = el('span', { className: 'agent-badge agent-badge-' + agLow }, rpt.agent || '-');
        var td0 = el('td'); td0.appendChild(badge); tr.appendChild(td0);
        tr.appendChild(el('td', null, rpt.model || '-'));
        tr.appendChild(el('td', null, fmtTokens(rpt.input_tokens)));
        tr.appendChild(el('td', null, fmtTokens(rpt.output_tokens)));
        tr.appendChild(el('td', null, fmtTokens(rpt.cache_read_tokens)));
        tr.appendChild(el('td', { style: { fontWeight: '700', color: 'var(--orange)' } }, fmtCost(rpt.cost_usd)));
        tr.appendChild(el('td', null, fmtDuration(rpt.duration_ms)));
        tr.appendChild(el('td', null, String(rpt.tool_calls || 0)));
        var ts = rpt.created_at ? new Date(rpt.created_at) : null;
        tr.appendChild(el('td', { style: { color: 'var(--text-muted)', fontSize: '12px' } }, ts ? ts.toLocaleString() : '-'));
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      tableSection.appendChild(table);
      termSection.appendChild(tableSection);
    }
  } else {
    var emptyTerm = el('div', { className: 'hof-empty', style: { padding: '20px' } });
    emptyTerm.appendChild(el('div', { className: 'hof-empty-icon' }, '\uD83D\uDDA5\uFE0F'));
    emptyTerm.appendChild(el('div', { className: 'hof-empty-text' }, 'No terminal session data yet. Agents will report metrics as they operate.'));
    termSection.appendChild(emptyTerm);
  }
  wrap.appendChild(termSection);

  // ════════════════════════════════════════════════
  // SECTION 3: API USAGE (Anthropic Admin API)
  // ════════════════════════════════════════════════
  var apiSection = el('div', { className: 'usage-section' });
  var apiHdr = el('div', { className: 'usage-section-header' });
  apiHdr.appendChild(el('span', { className: 'section-icon' }, '\uD83D\uDD11'));
  apiHdr.appendChild(el('span', null, 'API Agents'));
  apiSection.appendChild(apiHdr);

  if (S.anthropicUsage && S.anthropicUsage.usage) {
    var usageData = S.anthropicUsage.usage;
    var costData = S.anthropicUsage.costs;
    var buckets = usageData.data || [];

    var dailyMap = {};
    var modelMap = {};
    var keyMap = {};
    var apiTotalCost = 0;

    for (var bi = 0; bi < buckets.length; bi++) {
      var b = buckets[bi];
      var day = (b.bucket_start || '').slice(0, 10);
      var model = b.model || 'unknown';
      var keyId = b.api_key_id || 'unknown';
      var inputCost = ((parseInt(b.input_tokens) || 0) + (parseInt(b.cache_creation_input_tokens) || 0)) / 1000000;
      var outputCost = (parseInt(b.output_tokens) || 0) / 1000000;
      var cacheReadCost = (parseInt(b.cache_read_input_tokens) || 0) / 1000000;
      var rate = { input: 3, output: 15, cache_read: 0.3 };
      var ml = model.toLowerCase();
      if (ml.includes('opus')) rate = { input: 15, output: 75, cache_read: 1.5 };
      else if (ml.includes('haiku')) rate = { input: 0.80, output: 4, cache_read: 0.08 };
      var dayCost = inputCost * rate.input + outputCost * rate.output + cacheReadCost * rate.cache_read;
      apiTotalCost += dayCost;

      if (!dailyMap[day]) dailyMap[day] = 0;
      dailyMap[day] += dayCost;

      var modelShort = model.replace(/^claude-/, '').replace(/-\d{8}$/, '');
      if (!modelMap[modelShort]) modelMap[modelShort] = 0;
      modelMap[modelShort] += dayCost;

      if (!keyMap[keyId]) keyMap[keyId] = 0;
      keyMap[keyId] += dayCost;
    }

    if (costData && costData.data) {
      var costBuckets = costData.data;
      var costModelMap = {};
      var costTotal = 0;
      for (var cbi = 0; cbi < costBuckets.length; cbi++) {
        var cb = costBuckets[cbi];
        var costAmt = parseFloat(cb.cost_usd) || 0;
        var cModel = (cb.model || 'unknown').replace(/^claude-/, '').replace(/-\d{8}$/, '');
        if (!costModelMap[cModel]) costModelMap[cModel] = 0;
        costModelMap[cModel] += costAmt;
        costTotal += costAmt;
      }
      if (costTotal > 0) {
        apiTotalCost = costTotal;
        modelMap = costModelMap;
      }
    }

    // MTD banner
    var mtdBanner = el('div', { className: 'api-mtd-banner' });
    mtdBanner.appendChild(el('div', { className: 'api-mtd-icon' }, '\uD83D\uDCB8'));
    var mtdLeft = el('div');
    mtdLeft.appendChild(el('div', { className: 'api-mtd-label' }, 'API Spend (' + (S.usageDays || 7) + 'd)'));
    mtdLeft.appendChild(el('div', { className: 'api-mtd-amount' }, fmtCost(apiTotalCost)));
    mtdBanner.appendChild(mtdLeft);
    apiSection.appendChild(mtdBanner);

    // Daily cost bar chart
    var apiDays = Object.keys(dailyMap).sort();
    if (apiDays.length > 0) {
      var dailyChart = el('div', { className: 'api-daily-chart' });
      dailyChart.appendChild(el('div', { className: 'usage-chart-title' }, 'Daily API Cost'));
      var maxDaily = 0;
      for (var di = 0; di < apiDays.length; di++) { if (dailyMap[apiDays[di]] > maxDaily) maxDaily = dailyMap[apiDays[di]]; }
      var barsWrap = el('div', { className: 'api-daily-bars' });
      for (var di = 0; di < apiDays.length; di++) {
        var dayVal = dailyMap[apiDays[di]];
        var barPct = maxDaily > 0 ? (dayVal / maxDaily * 100) : 0;
        var col = el('div', { className: 'api-daily-bar-col' });
        col.appendChild(el('div', { className: 'api-daily-amount' }, fmtCost(dayVal)));
        col.appendChild(el('div', { className: 'api-daily-bar', style: { height: Math.max(barPct, 2) + '%' } }));
        col.appendChild(el('div', { className: 'api-daily-label' }, apiDays[di].slice(5)));
        barsWrap.appendChild(col);
      }
      dailyChart.appendChild(barsWrap);
      apiSection.appendChild(dailyChart);
    }

    // Per-model breakdown
    var models = Object.keys(modelMap).sort(function(a, b) { return modelMap[b] - modelMap[a]; });
    if (models.length > 0) {
      var modelGrid = el('div', { className: 'api-model-grid' });
      for (var mi = 0; mi < models.length; mi++) {
        var mCard = el('div', { className: 'api-model-card' });
        mCard.appendChild(el('div', { className: 'api-model-name' }, models[mi]));
        mCard.appendChild(el('div', { className: 'api-model-cost' }, fmtCost(modelMap[models[mi]])));
        modelGrid.appendChild(mCard);
      }
      apiSection.appendChild(modelGrid);
    }

    // Per-API-key breakdown
    var apiKeys = Object.keys(keyMap).sort(function(a, b) { return keyMap[b] - keyMap[a]; });
    if (apiKeys.length > 0) {
      var keySection = el('div', { className: 'usage-chart-section' });
      keySection.appendChild(el('div', { className: 'usage-chart-title' }, 'Cost by API Key'));
      var maxKeyCost = 0;
      for (var ki = 0; ki < apiKeys.length; ki++) { if (keyMap[apiKeys[ki]] > maxKeyCost) maxKeyCost = keyMap[apiKeys[ki]]; }
      for (var ki = 0; ki < apiKeys.length; ki++) {
        var kId = apiKeys[ki];
        var kCost = keyMap[kId];
        var kPct = maxKeyCost > 0 ? (kCost / maxKeyCost * 100) : 0;
        var kRow = el('div', { className: 'usage-cost-row' });
        var kLabel = kId.length > 20 ? kId.slice(0, 8) + '...' + kId.slice(-4) : kId;
        kRow.appendChild(el('div', { className: 'usage-cost-agent', style: { width: '120px', fontSize: '11px' } }, kLabel));
        var kBars = el('div', { className: 'usage-cost-bars' });
        kBars.appendChild(el('div', { className: 'usage-cost-bar input-cost', style: { width: Math.max(kPct, 2) + '%' } }));
        kRow.appendChild(kBars);
        kRow.appendChild(el('div', { className: 'usage-cost-total' }, fmtCost(kCost)));
        keySection.appendChild(kRow);
      }
      apiSection.appendChild(keySection);
    }
  } else {
    var emptyApi = el('div', { className: 'hof-empty', style: { padding: '20px' } });
    emptyApi.appendChild(el('div', { className: 'hof-empty-icon' }, '\uD83D\uDD11'));
    emptyApi.appendChild(el('div', { className: 'hof-empty-text' }, 'Click "Sync Anthropic API" to load API billing data.'));
    apiSection.appendChild(emptyApi);
  }
  wrap.appendChild(apiSection);

  main.replaceChildren(wrap);
}

function render() {
  var app = document.getElementById('app');
  if (!S.authed) { renderLogin(); return; }
  clearChildren(app);
  renderNav(app);
  var main = el('div', { className: 'main', id: 'main' });
  app.appendChild(main);
  if (S.view === 'dashboard') renderDashboard(main);
  else if (S.view === 'board') renderBoard(main);
  else if (S.view === 'scoreboard') renderScoreboard(main);
  else if (S.view === 'comms') renderComms(main);
  else if (S.view === 'billing') renderBilling(main);
  else if (S.view === 'usage') renderUsage(main);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { if (S.serviceModal) closeServiceModal(); else if (S.createModal) closeCreateModal(); else if (S.createChannelModal) closeCreateChannelModal(); else if (S.selectedTaskId) closeDrawer(); }
});

if (S.authed) { render(); loadAll().then(function() { S.loading = false; render(); updateFaviconBadge(); }); }
else { render(); }

// Favicon notification badge
var _faviconOriginal = document.querySelector('link[rel="icon"]').href;
var _faviconBadgeActive = false;
function updateFaviconBadge() {
  var hasUnread = S.totalUnread > 0;
  if (hasUnread === _faviconBadgeActive) return;
  _faviconBadgeActive = hasUnread;
  var link = document.querySelector('link[rel="icon"]');
  if (!hasUnread) { link.href = _faviconOriginal; return; }
  var img = new Image();
  img.onload = function() {
    var c = document.createElement('canvas');
    c.width = 64; c.height = 64;
    var ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, 64, 64);
    ctx.beginPath();
    ctx.arc(52, 12, 10, 0, 2 * Math.PI);
    ctx.fillStyle = '#e74c3c';
    ctx.fill();
    ctx.strokeStyle = '#100e0c';
    ctx.lineWidth = 2;
    ctx.stroke();
    link.href = c.toDataURL('image/png');
  };
  img.src = _faviconOriginal;
}

// WebSocket real-time updates — no polling
var socket = io();
function smartRefresh() {
  if (!S.authed || S.createModal || S.createChannelModal || S.selectedTaskId) return;
  var input = document.querySelector('.comms-input');
  var savedText = input ? input.value : '';
  var hadFocus = input && document.activeElement === input;
  var cursorPos = hadFocus ? input.selectionStart : 0;
  var msgArea = document.querySelector('.comms-messages');
  var wasAtBottom = msgArea ? (msgArea.scrollTop + msgArea.clientHeight >= msgArea.scrollHeight - 30) : true;
  loadAll().then(function() {
    render();
    updateFaviconBadge();
    var newInput = document.querySelector('.comms-input');
    if (newInput && savedText) { newInput.value = savedText; }
    if (newInput && hadFocus) { newInput.focus(); newInput.selectionStart = newInput.selectionEnd = cursorPos; }
    var newMsgArea = document.querySelector('.comms-messages');
    if (newMsgArea && wasAtBottom) { newMsgArea.scrollTop = newMsgArea.scrollHeight; }
  });
}
socket.on('message:new', smartRefresh);
socket.on('message:deleted', smartRefresh);
socket.on('task:new', smartRefresh);
socket.on('task:updated', smartRefresh);
socket.on('usage:new', smartRefresh);
})();
</script>
