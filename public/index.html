<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>BMP Command Center</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1714;
  --bg-elevated: #201d19;
  --card: #252220;
  --card-hover: #2d2a26;
  --border: #3d3630;
  --border-hover: #4d4438;
  --text: #e8e0d4;
  --text-secondary: #a89e8f;
  --text-muted: #6d6358;
  --green: #7c9a6e;
  --green-bg: rgba(124,154,110,0.12);
  --green-glow: rgba(124,154,110,0.3);
  --red: #b85c4c;
  --red-bg: rgba(184,92,76,0.12);
  --orange: #c8875c;
  --orange-bg: rgba(200,135,92,0.12);
  --tan: #bfa87a;
  --tan-bg: rgba(191,168,122,0.12);
  --slate: #6e8494;
  --slate-bg: rgba(110,132,148,0.12);
  --purple: #8b7aa8;
  --purple-bg: rgba(139,122,168,0.12);
  --accent: #c8875c;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 24px rgba(200,135,92,0.15), 0 2px 8px rgba(0,0,0,0.3);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.view-enter { animation: fadeInUp 200ms var(--ease); }
@keyframes cardEntrance { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes progressFill { from { width: 0%; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes toastIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(16px); } }

.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column-reverse; gap: 8px; }
.toast { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 20px; font-size: 13px; color: var(--text); box-shadow: 0 8px 24px rgba(0,0,0,0.5); animation: toastIn 250ms var(--spring); display: flex; align-items: center; gap: 10px; }
.toast.removing { animation: toastOut 200ms var(--ease) forwards; }
.toast-success { border-color: var(--green); }
.toast-error { border-color: var(--red); }

[data-tooltip] { position: relative; }
[data-tooltip]::after { content: attr(data-tooltip); position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) scale(0.95); background: #2d2620; color: var(--tan); border: 1px solid var(--border); font-size: 12px; font-weight: 400; line-height: 1.4; padding: 6px 10px; border-radius: 8px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 150ms var(--ease), transform 150ms var(--ease); z-index: 600; max-width: 280px; white-space: normal; }
[data-tooltip]:hover::after { opacity: 1; transform: translateX(-50%) scale(1); transition-delay: 300ms; }

/* LOGIN */
.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 32px; }
.login-logo { width: 160px; height: auto; margin-bottom: 8px; }
.login-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); }
.login-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; width: 360px; max-width: 90vw; }
.login-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: var(--tan); }
.login-field { margin-bottom: 18px; }
.login-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 8px; }
.login-select, .login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 10px 14px; font-family: var(--font); font-size: 14px; transition: border-color 150ms var(--ease); }
.login-select:focus, .login-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,135,92,0.1); }
.login-select option { background: var(--card); color: var(--text); }
.login-btn { width: 100%; background: linear-gradient(135deg, var(--accent) 0%, #a06840 100%); color: #1a1714; border: none; font-family: var(--font); font-weight: 700; font-size: 14px; padding: 12px; border-radius: var(--radius-sm); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 150ms var(--ease); margin-top: 8px; }
.login-btn:hover { box-shadow: 0 4px 16px rgba(200,135,92,0.4); }
.login-error { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; min-height: 18px; }

/* NAV */
.nav { position: sticky; top: 0; z-index: 100; background: rgba(26,23,20,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 0 24px; display: flex; align-items: center; height: 70px; gap: 20px; border-bottom: 1px solid var(--border); }
.nav-brand { display: flex; align-items: center; gap: 14px; white-space: nowrap; flex-shrink: 0; }
.nav-logo { height: 192px; width: auto; position: relative; z-index: 101; pointer-events: none; margin: -60px 0; }
.nav-brand-label { display: flex; flex-direction: column; line-height: 1; }
.nav-brand-title { font-weight: 800; font-size: 16px; letter-spacing: 3px; color: var(--text); text-transform: uppercase; }
.nav-tabs { display: flex; gap: 4px; margin: 0 auto; }
.nav-tab { background: none; border: none; color: var(--text-secondary); font-size: 15px; font-family: var(--font); font-weight: 600; padding: 10px 22px; border-radius: var(--radius-sm); cursor: pointer; transition: all 150ms var(--ease); position: relative; text-transform: uppercase; letter-spacing: 0.5px; }
.nav-tab:hover { color: var(--text); background: rgba(200,135,92,0.06); }
.nav-tab.active { color: var(--accent); background: rgba(200,135,92,0.08); }
.nav-tab-badge { position: absolute; top: 2px; right: 2px; background: var(--orange); color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
.nav-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.nav-user { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--tan); background: var(--tan-bg); border: 1px solid rgba(191,168,122,0.2); padding: 4px 12px; border-radius: 20px; }
.btn-new-task { background: linear-gradient(135deg, var(--accent) 0%, #a06840 100%); color: #1a1714; border: none; font-family: var(--font); font-size: 13px; font-weight: 700; padding: 8px 20px; border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap; transition: all 150ms var(--ease); text-transform: uppercase; letter-spacing: 0.5px; }
.btn-new-task:hover { box-shadow: 0 4px 16px rgba(200,135,92,0.4); transform: translateY(-1px); }
.btn-logout { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; font-family: var(--font); padding: 4px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all 150ms var(--ease); }
.btn-logout:hover { border-color: var(--red); color: var(--red); }
.hamburger { display: none; background: none; border: 1px solid var(--border); color: var(--text-secondary); width: 36px; height: 36px; border-radius: var(--radius-sm); cursor: pointer; align-items: center; justify-content: center; font-size: 18px; }
.mobile-menu { display: none; position: absolute; top: 70px; left: 0; right: 0; background: var(--card); border-bottom: 1px solid var(--border); padding: 8px; z-index: 99; }
.mobile-menu.open { display: flex; flex-direction: column; gap: 2px; }
.mobile-menu .nav-tab { text-align: left; padding: 12px 16px; }

/* MAIN */
.main { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* CARDS */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); }
.card-interactive { transition: all 200ms var(--ease); }
.card-interactive:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: var(--border-hover); }
.section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 14px; }

/* DASHBOARD */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.project-card { display: flex; align-items: center; text-decoration: none; color: var(--text); padding: 20px; gap: 16px; }
.project-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; border: 1px solid; }
.project-content { flex: 1; }
.project-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
.project-desc { font-size: 12px; color: var(--text-secondary); }
.project-arrow { color: var(--text-muted); font-size: 18px; opacity: 0; transition: opacity 150ms var(--ease), transform 150ms var(--ease); }
.project-card:hover .project-arrow { opacity: 1; transform: translateX(3px); }

.priority-list { display: flex; flex-direction: column; gap: 8px; }
.priority-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--radius-md); background: rgba(255,255,255,0.02); border: 1px solid var(--border); cursor: pointer; transition: all 150ms var(--ease); }
.priority-item:hover { background: rgba(200,135,92,0.04); border-color: var(--border-hover); transform: translateY(-1px); }
.priority-item-title { flex: 1; font-size: 14px; font-weight: 500; }

.agent-row { display: flex; gap: 12px; flex-wrap: wrap; }
.agent-card { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: var(--radius-md); flex: 1; min-width: 160px; }
.agent-avatar { font-size: 24px; }
.agent-name { font-size: 14px; font-weight: 600; }
.agent-role { font-size: 11px; color: var(--text-muted); }

.activity-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }
.activity-item:last-child { border-bottom: none; }
.activity-icon { font-size: 14px; flex-shrink: 0; }
.activity-actor { font-weight: 600; color: var(--accent); }
.activity-desc { color: var(--text-secondary); flex: 1; }
.activity-time { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }

.sprint-bar-wrap { background: rgba(255,255,255,0.06); border-radius: 8px; height: 8px; overflow: hidden; margin: 8px 0; border: 1px solid rgba(255,255,255,0.03); }
.sprint-bar-fill { height: 100%; border-radius: 7px; background: linear-gradient(90deg, var(--green), #8aad7a); transition: width 600ms var(--ease); animation: progressFill 800ms var(--ease); }
.sprint-stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); }
.sprint-stat-num { font-weight: 700; }

/* BOARD */
.sprint-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.sprint-selector select { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px; font-family: var(--font); font-size: 13px; cursor: pointer; }
.sprint-selector select:focus { outline: none; border-color: var(--accent); }
.board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; min-height: calc(100vh - 180px); }
.board-col { min-width: 260px; flex: 1; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; display: flex; flex-direction: column; }
.board-col-scroll { flex: 1; overflow-y: auto; padding-right: 4px; }
.col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-shrink: 0; padding: 8px 10px; border-radius: var(--radius-sm); }
.col-header-left { display: flex; align-items: center; gap: 8px; }
.col-icon { font-size: 14px; }
.col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); }
.col-count { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 10px; }

.board-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px; margin-bottom: 10px; cursor: pointer; box-shadow: var(--shadow); transition: transform 200ms var(--ease), box-shadow 200ms var(--ease), border-color 200ms var(--ease); animation: cardEntrance 300ms var(--ease) backwards; }
.board-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
.board-card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.board-card-title { flex: 1; font-size: 13px; font-weight: 500; line-height: 1.4; }
.board-card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 12px; color: var(--text-secondary); }
.board-card-assignee { display: flex; align-items: center; gap: 4px; font-size: 12px; }
.board-card-branch { font-family: var(--mono); font-size: 11px; background: rgba(255,255,255,0.04); padding: 2px 8px; border-radius: 4px; color: var(--text-muted); }

.chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 0 10px; height: 24px; border-radius: 12px; border: 1px solid; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.3px; }
.chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.chip-queued { background: rgba(109,99,88,0.15); color: var(--text-muted); border-color: rgba(109,99,88,0.3); }
.chip-queued .chip-dot { background: var(--text-muted); }
.chip-in_progress { background: var(--orange-bg); color: var(--orange); border-color: rgba(200,135,92,0.3); }
.chip-in_progress .chip-dot { background: var(--orange); animation: pulse 2s infinite; }
.chip-on_staging { background: var(--tan-bg); color: var(--tan); border-color: rgba(191,168,122,0.3); }
.chip-on_staging .chip-dot { background: var(--tan); }
.chip-review { background: var(--purple-bg); color: var(--purple); border-color: rgba(139,122,168,0.3); }
.chip-review .chip-dot { background: var(--purple); }
.chip-complete { background: var(--green-bg); color: var(--green); border-color: var(--green-glow); }
.chip-complete .chip-dot { background: var(--green); }

.rank-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 800; padding: 2px 8px; height: 22px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
.rank-1 { background: var(--red-bg); color: var(--red); border: 1px solid rgba(184,92,76,0.3); }
.rank-2 { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(200,135,92,0.3); }
.rank-3 { background: var(--tan-bg); color: var(--tan); border: 1px solid rgba(191,168,122,0.2); }
.rank-4 { background: var(--slate-bg); color: var(--slate); border: 1px solid rgba(110,132,148,0.2); }
.rank-5 { background: rgba(109,99,88,0.12); color: var(--text-muted); border: 1px solid rgba(109,99,88,0.2); }

/* COMMS */
.comms-layout { display: flex; gap: 0; height: calc(100vh - 80px); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
.comms-sidebar { width: 280px; min-width: 280px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.comms-sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.comms-sidebar-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }
.btn-new-channel { background: none; border: 1px solid var(--border); color: var(--text-muted); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 200ms var(--ease); }
.btn-new-channel:hover { border-color: var(--accent); color: var(--accent); background: var(--orange-bg); }
.comms-channels { flex: 1; overflow-y: auto; padding: 8px; }
.channel-item { padding: 10px 12px; border-radius: var(--radius-md); cursor: pointer; margin-bottom: 2px; transition: all 150ms var(--ease); display: flex; flex-direction: column; gap: 4px; border: 1px solid transparent; }
.channel-item:hover { background: rgba(255,255,255,0.03); }
.channel-item.active { background: var(--orange-bg); border-color: rgba(200,135,92,0.2); }
.channel-item-header { display: flex; justify-content: space-between; align-items: center; }
.channel-item-name { font-weight: 600; font-size: 13px; color: var(--text); }
.channel-item-unread { background: var(--orange); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 700; }
.channel-item-preview { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.channel-item-members { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

.comms-chat { flex: 1; display: flex; flex-direction: column; background: var(--bg-elevated); }
.comms-chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.comms-chat-name { font-size: 16px; font-weight: 700; }
.comms-chat-members { font-size: 12px; color: var(--text-muted); }
.comms-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.msg-bubble { display: flex; gap: 10px; align-items: flex-start; }
.msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; border: 1px solid var(--border); background: var(--card); }
.msg-body { flex: 1; }
.msg-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 2px; }
.msg-sender { font-weight: 600; font-size: 13px; color: var(--text); }
.msg-time { font-size: 11px; color: var(--text-muted); }
.msg-content { font-size: 13px; color: var(--text); line-height: 1.5; white-space: pre-wrap; }
.comms-input-bar { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--card); }
.comms-input { flex: 1; resize: none; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; background: var(--bg); color: var(--text); font-family: var(--font); min-height: 42px; max-height: 120px; }
.comms-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,135,92,0.1); }
.comms-send { background: linear-gradient(135deg, var(--accent) 0%, #a06840 100%); color: #1a1714; border: none; font-family: var(--font); font-weight: 700; font-size: 13px; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; transition: all 150ms var(--ease); align-self: flex-end; }
.comms-send:hover { box-shadow: 0 4px 12px rgba(200,135,92,0.3); }
.comms-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text-muted); font-size: 14px; }

/* DRAWER */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 200; opacity: 0; transition: opacity 250ms var(--ease); pointer-events: none; }
.overlay.open { opacity: 1; pointer-events: all; }
.drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 440px; max-width: 100%; background: var(--bg-elevated); border-left: 1px solid var(--border); z-index: 201; transform: translateX(100%); transition: transform 250ms var(--ease); overflow-y: auto; }
.drawer.open { transform: translateX(0); }
.drawer-strip { height: 4px; background: linear-gradient(90deg, var(--accent), var(--tan), var(--accent)); opacity: 0.7; }
.drawer-inner { padding: 24px; }
.drawer-close { position: absolute; top: 20px; right: 16px; background: none; border: 1px solid var(--border); color: var(--text-secondary); font-size: 16px; cursor: pointer; width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; transition: all 150ms var(--ease); z-index: 1; }
.drawer-close:hover { background: rgba(200,135,92,0.1); color: var(--text); border-color: var(--accent); }
.drawer-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; padding-right: 44px; line-height: 1.3; }
.drawer-section { margin-bottom: 24px; }
.drawer-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 10px; }
.drawer-objective { background: rgba(200,135,92,0.06); border: 1px solid rgba(200,135,92,0.15); border-radius: var(--radius-md); padding: 16px; margin-bottom: 16px; }
.drawer-objective-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 8px; }
.drawer-objective-text { font-size: 14px; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
.status-row, .priority-row { display: flex; flex-wrap: wrap; gap: 6px; }
.status-btn { cursor: pointer; transition: opacity 150ms var(--ease), transform 150ms var(--ease); }
.status-btn:hover { opacity: 0.8; transform: scale(1.05); }
.status-btn.current { box-shadow: 0 0 0 2px var(--accent); }
.pri-btn { display: inline-flex; align-items: center; justify-content: center; padding: 4px 12px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 2px solid transparent; transition: all 150ms var(--ease); }
.pri-btn:hover { transform: scale(1.08); }
.pri-btn.current { border-color: var(--text); box-shadow: 0 0 0 3px rgba(232,224,212,0.15); }
.meta-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px 16px; font-size: 13px; }
.meta-key { color: var(--text-muted); }
.meta-val { color: var(--text); display: flex; align-items: center; gap: 6px; }
.meta-val.mono { font-family: var(--mono); font-size: 12px; background: rgba(255,255,255,0.04); padding: 2px 8px; border-radius: 4px; }
.approve-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-approve { background: var(--green); color: #1a1714; border: none; font-family: var(--font); font-weight: 700; font-size: 13px; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; flex: 1; transition: all 150ms var(--ease); }
.btn-approve:hover { box-shadow: 0 4px 12px rgba(124,154,110,0.3); }
.btn-changes { background: transparent; color: var(--red); border: 1px solid var(--red); font-family: var(--font); font-weight: 600; font-size: 13px; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; flex: 1; transition: all 150ms var(--ease); }
.btn-changes:hover { background: var(--red-bg); }

.comment { margin-bottom: 12px; padding: 10px 14px; background: rgba(255,255,255,0.02); border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.03); }
.comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.comment-author { font-size: 13px; font-weight: 700; }
.comment-time { font-size: 12px; color: var(--text-muted); }
.comment-body { font-size: 13px; color: var(--text-secondary); white-space: pre-wrap; line-height: 1.5; }
.comment-input-row { display: flex; gap: 8px; margin-top: 12px; }
.comment-input-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 10px 14px; font-family: var(--font); font-size: 13px; }
.comment-input-row input:focus { outline: none; border-color: var(--accent); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 200ms var(--ease); }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 0; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 48px rgba(0,0,0,0.5); transform: scale(0.95); opacity: 0; transition: transform 200ms var(--spring), opacity 200ms var(--ease); }
.modal-overlay.open .modal { transform: scale(1); opacity: 1; }
.modal-strip { height: 4px; background: linear-gradient(90deg, var(--accent), var(--tan), var(--accent)); opacity: 0.7; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.modal-inner { padding: 28px; }
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; color: var(--tan); }
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 8px; }
.form-input, .form-textarea, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 10px 14px; font-family: var(--font); font-size: 14px; transition: border-color 150ms var(--ease); }
.form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,135,92,0.1); }
.form-textarea { min-height: 80px; resize: vertical; }
.form-input.error { border-color: var(--red); }
.form-select option { background: var(--card); }
.pri-selector { display: flex; gap: 8px; }
.pri-opt { padding: 6px 14px; border-radius: 4px; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 10px; cursor: pointer; text-transform: uppercase; transition: all 150ms var(--ease); }
.pri-opt:hover { transform: scale(1.08); }
.pri-opt.selected { border-color: var(--text); box-shadow: 0 0 0 3px rgba(232,224,212,0.15); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 28px; }
.btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-secondary); font-family: var(--font); font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; transition: all 150ms var(--ease); }
.btn-cancel:hover { border-color: var(--border-hover); color: var(--text); }
.btn-create { background: linear-gradient(135deg, var(--accent) 0%, #a06840 100%); color: #1a1714; border: none; font-family: var(--font); font-weight: 700; font-size: 13px; padding: 10px 28px; border-radius: var(--radius-sm); cursor: pointer; transition: all 150ms var(--ease); }
.btn-create:hover { box-shadow: 0 4px 16px rgba(200,135,92,0.4); }
.btn-sm { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-secondary); font-family: var(--font); font-size: 12px; padding: 6px 16px; border-radius: var(--radius-sm); cursor: pointer; transition: all 150ms var(--ease); font-weight: 600; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); background: var(--orange-bg); }

.empty-text { text-align: center; padding: 24px; color: var(--text-muted); font-size: 13px; }

@media (max-width: 900px) { .board { flex-direction: column; min-height: auto; } .board-col { min-width: 0; } .dash-grid { grid-template-columns: 1fr; } }
@media (max-width: 768px) { .drawer { width: 100%; } .nav { padding: 0 16px; gap: 8px; } .nav-tabs { display: none; } .hamburger { display: flex; } .main { padding: 16px; } .comms-sidebar { width: 200px; min-width: 200px; } }
</style>
</head>
<body>

<div id="app"></div>
<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>
<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal"></div></div>
<div class="toast-container" id="toast-container"></div>

<script>
(function() {
'use strict';

var S = {
  view: 'dashboard',
  authed: false,
  user: null,
  sessionToken: null,
  tasks: [],
  sprints: [],
  activeSprint: null,
  activity: [],
  overview: null,
  channels: [],
  messages: [],
  selectedChannelId: null,
  selectedTaskId: null,
  selectedSprintId: null,
  createModal: false,
  createChannelModal: false,
  mobileMenuOpen: false,
  loading: true,
  totalUnread: 0
};

var savedToken = localStorage.getItem('cc_session_token');
var savedUser = localStorage.getItem('cc_session_user');
if (savedToken && savedUser) {
  S.sessionToken = savedToken;
  S.user = savedUser;
  S.authed = true;
}

function clearChildren(node) { while (node.firstChild) node.removeChild(node.firstChild); }

function toast(message, type) {
  type = type || 'success';
  var container = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = (type === 'success' ? '\u2713 ' : '\u2717 ') + message;
  container.appendChild(t);
  setTimeout(function() { t.classList.add('removing'); setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 200); }, 2500);
}

var API = {
  base: '',
  headers: function() {
    var h = { 'Content-Type': 'application/json' };
    if (S.sessionToken) h['x-session-token'] = S.sessionToken;
    return h;
  },
  get: function(path) { return fetch(this.base + path, { headers: this.headers() }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }); },
  post: function(path, body) { return fetch(this.base + path, { method: 'POST', headers: this.headers(), body: JSON.stringify(body) }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }); },
  patch: function(path, body) { return fetch(this.base + path, { method: 'PATCH', headers: this.headers(), body: JSON.stringify(body) }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }); },
  del: function(path) { return fetch(this.base + path, { method: 'DELETE', headers: this.headers() }).then(function(r) { return r.ok; }).catch(function() { return false; }); }
};

function el(tag, attrs) {
  var e = document.createElement(tag);
  var children = Array.prototype.slice.call(arguments, 2);
  if (attrs) {
    var keys = Object.keys(attrs);
    for (var ki = 0; ki < keys.length; ki++) {
      var k = keys[ki], v = attrs[k];
      if (k === 'className') e.className = v;
      else if (k === 'style' && typeof v === 'object') { var sk = Object.keys(v); for (var si = 0; si < sk.length; si++) e.style[sk[si]] = v[sk[si]]; }
      else if (k.indexOf('on') === 0 && k.length > 2) e.addEventListener(k.charAt(2).toLowerCase() + k.slice(3), v);
      else e.setAttribute(k, v);
    }
  }
  for (var ci = 0; ci < children.length; ci++) {
    var c = children[ci];
    if (c == null) continue;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (Array.isArray(c)) { for (var ai = 0; ai < c.length; ai++) { if (c[ai]) e.appendChild(c[ai]); } }
    else e.appendChild(c);
  }
  return e;
}

var STATUS_LABELS = { queued: 'Queued', in_progress: 'In Progress', on_staging: 'On Staging', review: 'Review', complete: 'Complete' };
var STATUSES = ['queued', 'in_progress', 'on_staging', 'review', 'complete'];
var STATUS_META = {
  queued: { icon: '\u23F3', color: 'var(--text-muted)', bg: 'rgba(109,99,88,0.15)', border: 'rgba(109,99,88,0.3)' },
  in_progress: { icon: '\u26A1', color: 'var(--orange)', bg: 'var(--orange-bg)', border: 'rgba(200,135,92,0.3)' },
  on_staging: { icon: '\uD83D\uDD2C', color: 'var(--tan)', bg: 'var(--tan-bg)', border: 'rgba(191,168,122,0.3)' },
  review: { icon: '\uD83D\uDC41', color: 'var(--purple)', bg: 'var(--purple-bg)', border: 'rgba(139,122,168,0.3)' },
  complete: { icon: '\u2705', color: 'var(--green)', bg: 'var(--green-bg)', border: 'var(--green-glow)' }
};
var RANK_LABELS = { 1: 'CRITICAL', 2: 'HIGH', 3: 'NORMAL', 4: 'LOW', 5: 'MINOR' };
var PRI_COLORS = { 1: 'var(--red)', 2: 'var(--orange)', 3: 'var(--tan)', 4: 'var(--slate)', 5: 'var(--text-muted)' };
var PRI_BG = { 1: 'var(--red-bg)', 2: 'var(--orange-bg)', 3: 'var(--tan-bg)', 4: 'var(--slate-bg)', 5: 'rgba(109,99,88,0.12)' };
var AGENT_AVATARS = { socrates: '\uD83E\uDDD9', atlas: '\uD83E\uDDED', titus: '\u2694\uFE0F', will: '\uD83D\uDD31', mike: '\uD83D\uDE80', davinci: '\uD83C\uDFA8', browser: '\uD83D\uDDA5\uFE0F' };
var HUMANS = ['will', 'mike'];
var ACTIVITY_ICONS = { task_created: '\u2795', task_updated: '\uD83D\uDD27', comment_added: '\uD83D\uDCAC', file_attached: '\uD83D\uDCCE', task_deleted: '\uD83D\uDDD1', sprint_created: '\uD83C\uDFC1', message_sent: '\u2709', channel_created: '\uD83D\uDCE2' };

function getAvatar(name) { return AGENT_AVATARS[(name || '').toLowerCase()] || '\uD83D\uDC64'; }
function makeChip(status) { var c = el('span', { className: 'chip chip-' + status }); c.appendChild(el('span', { className: 'chip-dot' })); c.appendChild(el('span', { className: 'chip-text' }, STATUS_LABELS[status] || status)); return c; }
function makeRank(p) { p = p || 3; return el('span', { className: 'rank-badge rank-' + p }, RANK_LABELS[p] || 'NORMAL'); }
function relTime(d) { if (!d) return ''; var diff = (Date.now() - new Date(d).getTime()) / 1000; if (diff < 60) return 'just now'; if (diff < 3600) return Math.floor(diff / 60) + 'm ago'; if (diff < 86400) return Math.floor(diff / 3600) + 'h ago'; if (diff < 604800) return Math.floor(diff / 86400) + 'd ago'; return new Date(d).toLocaleDateString(); }

function loadAll() {
  return Promise.all([
    API.get('/api/overview').then(function(d) { S.overview = d; }),
    API.get('/api/tasks' + (S.selectedSprintId ? '?sprint_id=' + S.selectedSprintId : '')).then(function(d) { S.tasks = d && d.tasks ? d.tasks : []; }),
    API.get('/api/sprints').then(function(d) { S.sprints = d && d.sprints ? d.sprints : []; }),
    API.get('/api/activity?limit=15').then(function(d) { S.activity = d && d.activity ? d.activity : []; }),
    API.get('/api/channels').then(function(d) { S.channels = d && d.channels ? d.channels : []; }),
    API.get('/api/messages?limit=200').then(function(d) { S.messages = d && d.messages ? d.messages : []; })
  ]).then(function() {
    S.totalUnread = 0;
    var me = (S.user || '').toLowerCase();
    for (var i = 0; i < S.messages.length; i++) {
      var m = S.messages[i];
      if (!m.read && m.sender.toLowerCase() !== me) {
        if (m.channel_id) {
          var ch = S.channels.find(function(c) { return c.id === m.channel_id; });
          if (ch) {
            var members = typeof ch.members === 'string' ? JSON.parse(ch.members) : ch.members;
            var chHumans = members.filter(function(mem) { return HUMANS.indexOf(mem.toLowerCase()) !== -1; });
            var amHuman = HUMANS.indexOf(me) !== -1;
            var amMember = members.some(function(mem) { return mem.toLowerCase() === me; });
            var canSee = amHuman ? (chHumans.length === 0 || amMember) : amMember;
            if (canSee) S.totalUnread++;
          }
        } else if (m.recipient && m.recipient.toLowerCase() === me) {
          S.totalUnread++;
        }
      }
    }
  });
}

function renderLogin() {
  var app = document.getElementById('app');
  var screen = el('div', { className: 'login-screen' });
  screen.appendChild(el('img', { className: 'login-logo', src: '/logo.png', alt: 'BMP' }));
  screen.appendChild(el('div', { className: 'login-title' }, 'Command Center'));
  var card = el('div', { className: 'login-card' });
  card.appendChild(el('h2', null, 'Sign In'));
  var fieldUser = el('div', { className: 'login-field' });
  fieldUser.appendChild(el('label', { className: 'login-label' }, 'Who are you?'));
  var sel = el('select', { className: 'login-select', id: 'login-user' });
  sel.appendChild(el('option', { value: 'Will' }, 'Will'));
  sel.appendChild(el('option', { value: 'Mike' }, 'Mike'));
  fieldUser.appendChild(sel);
  card.appendChild(fieldUser);
  var fieldPin = el('div', { className: 'login-field' });
  fieldPin.appendChild(el('label', { className: 'login-label' }, 'PIN'));
  fieldPin.appendChild(el('input', { className: 'login-input', id: 'login-pin', type: 'password', placeholder: 'Enter your PIN' }));
  card.appendChild(fieldPin);
  var errEl = el('div', { className: 'login-error', id: 'login-error' });
  card.appendChild(errEl);

  function doLogin() {
    var username = document.getElementById('login-user').value;
    var pin = document.getElementById('login-pin').value;
    if (!pin) { document.getElementById('login-error').textContent = 'Enter your PIN'; return; }
    fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: username, pin: pin }) })
      .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
      .then(function(res) {
        if (!res.ok) { document.getElementById('login-error').textContent = 'Invalid PIN'; return; }
        S.sessionToken = res.data.token;
        S.user = res.data.user;
        S.authed = true;
        localStorage.setItem('cc_session_token', res.data.token);
        localStorage.setItem('cc_session_user', res.data.user);
        loadAll().then(function() { S.loading = false; render(); });
      });
  }

  card.appendChild(el('button', { className: 'login-btn', onClick: doLogin }, 'Enter Command Center'));
  screen.appendChild(card);
  app.replaceChildren(screen);
  setTimeout(function() {
    var pinInput = document.getElementById('login-pin');
    if (pinInput) pinInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  }, 50);
}

function renderNav(container) {
  var nav = el('nav', { className: 'nav' });
  var brand = el('div', { className: 'nav-brand' });
  brand.appendChild(el('img', { className: 'nav-logo', src: '/logo.png', alt: 'BMP' }));
  var brandLabel = el('div', { className: 'nav-brand-label' });
  brandLabel.appendChild(el('span', { className: 'nav-brand-title' }, 'Command Center'));
  brand.appendChild(brandLabel);
  nav.appendChild(brand);

  nav.appendChild(el('button', { className: 'hamburger', onClick: function() {
    S.mobileMenuOpen = !S.mobileMenuOpen;
    var mm = document.getElementById('mobile-menu');
    if (mm) { if (S.mobileMenuOpen) mm.classList.add('open'); else mm.classList.remove('open'); }
  } }, '\u2630'));

  var tabs = el('div', { className: 'nav-tabs' });
  var views = [{ key: 'dashboard', label: 'Dashboard' }, { key: 'board', label: 'Sprint Board' }, { key: 'comms', label: 'Conference Room' }];
  for (var vi = 0; vi < views.length; vi++) {
    (function(v) {
      var btn = el('button', { className: 'nav-tab' + (S.view === v.key ? ' active' : ''), onClick: function() { S.view = v.key; render(); } }, v.label);
      if (v.key === 'comms' && S.totalUnread > 0) btn.appendChild(el('span', { className: 'nav-tab-badge' }, String(S.totalUnread)));
      tabs.appendChild(btn);
    })(views[vi]);
  }
  nav.appendChild(tabs);

  var right = el('div', { className: 'nav-right' });
  right.appendChild(el('div', { className: 'nav-user' }, getAvatar(S.user) + ' ' + (S.user || 'Unknown')));
  right.appendChild(el('button', { className: 'btn-new-task', onClick: function() { openCreateModal(); } }, '+ New Task'));
  right.appendChild(el('button', { className: 'btn-logout', onClick: function() {
    localStorage.removeItem('cc_session_token'); localStorage.removeItem('cc_session_user');
    S.authed = false; S.sessionToken = null; S.user = null; render();
  } }, 'Sign Out'));
  nav.appendChild(right);
  container.appendChild(nav);

  var mm = el('div', { className: 'mobile-menu', id: 'mobile-menu' });
  for (var mi = 0; mi < views.length; mi++) {
    (function(v) { mm.appendChild(el('button', { className: 'nav-tab' + (S.view === v.key ? ' active' : ''), onClick: function() { S.view = v.key; S.mobileMenuOpen = false; render(); } }, v.label)); })(views[mi]);
  }
  container.appendChild(mm);
}

function renderDashboard(main) {
  var wrap = el('div', { className: 'view-enter' });
  var grid = el('div', { className: 'dash-grid' });
  var fsCard = el('a', { className: 'card card-interactive project-card', href: 'https://flowstack-production.up.railway.app', target: '_blank' });
  fsCard.appendChild(el('div', { className: 'project-icon', style: { background: 'var(--green-bg)', borderColor: 'var(--green-glow)', color: 'var(--green)' } }, '\uD83C\uDFAC'));
  var fsContent = el('div', { className: 'project-content' });
  fsContent.appendChild(el('div', { className: 'project-title' }, 'FlowStack'));
  fsContent.appendChild(el('div', { className: 'project-desc' }, 'AI Content OS \u2022 Production'));
  fsCard.appendChild(fsContent);
  fsCard.appendChild(el('span', { className: 'project-arrow' }, '\u2192'));
  grid.appendChild(fsCard);

  var ccCard = el('a', { className: 'card card-interactive project-card', href: '#', onClick: function(e) { e.preventDefault(); } });
  ccCard.appendChild(el('div', { className: 'project-icon', style: { background: 'var(--orange-bg)', borderColor: 'rgba(200,135,92,0.3)', color: 'var(--orange)' } }, '\uD83D\uDEE1\uFE0F'));
  var ccContent = el('div', { className: 'project-content' });
  ccContent.appendChild(el('div', { className: 'project-title' }, 'Command Center'));
  ccContent.appendChild(el('div', { className: 'project-desc' }, 'BMP Operations Hub \u2022 You are here'));
  ccCard.appendChild(ccContent);
  grid.appendChild(ccCard);
  wrap.appendChild(grid);

  var ov = S.overview;
  if (ov && ov.active_sprint) {
    var sp = ov.active_sprint, tc = sp.task_counts || {};
    var pct = tc.total > 0 ? Math.round((tc.complete / tc.total) * 100) : 0;
    var sprintCard = el('div', { className: 'card', style: { marginBottom: '24px' } });
    var sprintHeader = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' } });
    sprintHeader.appendChild(el('div', { className: 'section-title', style: { margin: '0' } }, 'Active Sprint: ' + (sp.name || 'Untitled')));
    sprintHeader.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--text-muted)' } }, pct + '% complete'));
    sprintCard.appendChild(sprintHeader);
    var barWrap = el('div', { className: 'sprint-bar-wrap' });
    barWrap.appendChild(el('div', { className: 'sprint-bar-fill', style: { width: pct + '%' } }));
    sprintCard.appendChild(barWrap);
    var stats = el('div', { className: 'sprint-stats' });
    [[tc.complete, 'Complete'], [tc.in_progress, 'In Progress'], [tc.on_staging, 'Staging'], [tc.queued, 'Queued']].forEach(function(pair) {
      if (pair[0] != null) { var s = el('span'); s.appendChild(el('span', { className: 'sprint-stat-num' }, String(pair[0]))); s.appendChild(document.createTextNode(' ' + pair[1])); stats.appendChild(s); }
    });
    sprintCard.appendChild(stats);
    wrap.appendChild(sprintCard);
  }

  var urgentTasks = S.tasks.filter(function(t) { return t.status !== 'complete' && t.priority <= 2; }).sort(function(a, b) { return a.priority - b.priority; });
  if (urgentTasks.length > 0) {
    var priCard = el('div', { className: 'card', style: { marginBottom: '24px' } });
    priCard.appendChild(el('div', { className: 'section-title' }, 'Needs Attention'));
    var priList = el('div', { className: 'priority-list' });
    for (var pi = 0; pi < Math.min(urgentTasks.length, 5); pi++) {
      (function(t) {
        var item = el('div', { className: 'priority-item', onClick: function() { openDrawer(t.id); } });
        item.appendChild(el('span', { style: { fontSize: '16px' } }, getAvatar(t.assignee)));
        item.appendChild(makeRank(t.priority));
        item.appendChild(el('span', { className: 'priority-item-title' }, t.title));

function renderBoard(main) {

  sel.appendChild(el('option', { value: '' }, 'All Sprints'));
  S.sprints.forEach(function(sp) { var opt = el('option', { value: String(sp.id) }, sp.name || ('Sprint ' + sp.id)); if (S.selectedSprintId && String(sp.id) === String(S.selectedSprintId)) opt.selected = true; sel.appendChild(opt); });

    var hdr = el('div', { className: 'col-header', style: { background: meta.bg } });

      var top = el('div', { className: 'board-card-top' });

      if (t.branch) metaRow.appendChild(el('span', { className: 'board-card-branch' }, t.branch));

function renderComms(main) {
  var wrap = el('div', { className: 'view-enter' });
  var layout = el('div', { className: 'comms-layout' });
  var sidebar = el('div', { className: 'comms-sidebar' });
  var sidebarHeader = el('div', { className: 'comms-sidebar-header' });
  sidebarHeader.appendChild(el('span', { className: 'comms-sidebar-title' }, 'Channels'));
  sidebarHeader.appendChild(el('button', { className: 'btn-new-channel', 'data-tooltip': 'Create channel', onClick: function() { openCreateChannelModal(); } }, '+'));
  sidebar.appendChild(sidebarHeader);
  var channelList = el('div', { className: 'comms-channels' });
  var me = (S.user || '').toLowerCase();

  S.channels.forEach(function(ch) {
    var members = typeof ch.members === 'string' ? JSON.parse(ch.members) : ch.members;
    // Visibility rule: agent-only channels visible to all humans, human channels only visible to member humans
    var channelHumans = members.filter(function(m) { return HUMANS.indexOf(m.toLowerCase()) !== -1; });
    var iAmHuman = HUMANS.indexOf(me) !== -1;
    var iAmMember = members.some(function(m) { return m.toLowerCase() === me; });
    if (iAmHuman) {
      // Human: see agent-only channels + channels I'm a member of
      if (channelHumans.length > 0 && !iAmMember) return;
    } else {
      // Agent: only see channels I'm a member of
      if (!iAmMember) return;
    }
    var unread = 0, lastMsg = null;
    S.messages.forEach(function(m) { if (m.channel_id === ch.id) { lastMsg = m; if (!m.read && m.sender.toLowerCase() !== me) unread++; } });
    var item = el('div', { className: 'channel-item' + (S.selectedChannelId === ch.id ? ' active' : ''), onClick: function() {
      S.selectedChannelId = ch.id;
      API.patch('/api/messages/read', { channel_id: ch.id });
      render();
    } });
    var hdr = el('div', { className: 'channel-item-header' });
    hdr.appendChild(el('span', { className: 'channel-item-name' }, ch.name));
    if (unread > 0) hdr.appendChild(el('span', { className: 'channel-item-unread' }, String(unread)));
    item.appendChild(hdr);
    if (lastMsg) item.appendChild(el('div', { className: 'channel-item-preview' }, lastMsg.sender + ': ' + lastMsg.content.slice(0, 50)));
    item.appendChild(el('div', { className: 'channel-item-members' }, members.map(function(m) { return getAvatar(m); }).join(' ')));
    channelList.appendChild(item);
  });
  if (!S.channels.length) channelList.appendChild(el('div', { style: { color: 'var(--text-muted)', fontSize: '13px', padding: '20px', textAlign: 'center' } }, 'No channels yet'));
  sidebar.appendChild(channelList);
  layout.appendChild(sidebar);

  var chatArea = el('div', { className: 'comms-chat' });
  if (S.selectedChannelId) {
    var activeChannel = S.channels.find(function(c) { return c.id === S.selectedChannelId; });
    if (activeChannel) {
      var members = typeof activeChannel.members === 'string' ? JSON.parse(activeChannel.members) : activeChannel.members;
      var chatHeader = el('div', { className: 'comms-chat-header' });
      chatHeader.appendChild(el('span', { className: 'comms-chat-name' }, activeChannel.name));
      chatHeader.appendChild(el('span', { className: 'comms-chat-members' }, members.join(', ')));
      chatArea.appendChild(chatHeader);
      var msgArea = el('div', { className: 'comms-messages' });
      S.messages.filter(function(m) { return m.channel_id === activeChannel.id; }).forEach(function(msg) {
        var bubble = el('div', { className: 'msg-bubble' });
        bubble.appendChild(el('div', { className: 'msg-avatar' }, getAvatar(msg.sender)));
        var body = el('div', { className: 'msg-body' });
        var header = el('div', { className: 'msg-header' });
        header.appendChild(el('span', { className: 'msg-sender' }, msg.sender));
        header.appendChild(el('span', { className: 'msg-time' }, new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })));
        body.appendChild(header);
        body.appendChild(el('div', { className: 'msg-content' }, msg.content));
        bubble.appendChild(body);
        msgArea.appendChild(bubble);
      });
      chatArea.appendChild(msgArea);
      setTimeout(function() { msgArea.scrollTop = msgArea.scrollHeight; }, 0);
      var inputBar = el('div', { className: 'comms-input-bar' });
      var input = el('textarea', { className: 'comms-input', placeholder: 'Type a message...', rows: '1' });
      var sendBtn = el('button', { className: 'comms-send', onClick: function() {
        var content = input.value.trim(); if (!content) return;
        API.post('/api/messages', { content: content, channel_id: activeChannel.id }).then(function() { input.value = ''; loadAll().then(render); });
      } }, 'Send');
      input.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } });
      inputBar.appendChild(input);
      inputBar.appendChild(sendBtn);
      chatArea.appendChild(inputBar);
    }
  } else { chatArea.appendChild(el('div', { className: 'comms-empty' }, 'Select a channel to start chatting')); }
  layout.appendChild(chatArea);
  wrap.appendChild(layout);
  main.replaceChildren(wrap);
}

function openDrawer(taskId) {
  S.selectedTaskId = taskId;

  clearChildren(drawer);
  overlay.classList.add('open');
  overlay.onclick = closeDrawer;

  var inner = el('div', { className: 'drawer-inner' });
  inner.appendChild(el('div', { style: { height: '60px' } }));
  drawer.appendChild(inner);

  API.get('/api/tasks/' + taskId).then(function(data) {
    if (!data) { closeDrawer(); return; }
    var task = data.task || data, comments = data.comments || [];
    clearChildren(inner);
    inner.appendChild(el('button', { className: 'drawer-close', onClick: closeDrawer }, '\u2715'));
    inner.appendChild(el('div', { className: 'drawer-title' }, task.title || 'Untitled'));
    if (task.description) {
      var objBox = el('div', { className: 'drawer-objective' });
      objBox.appendChild(el('div', { className: 'drawer-objective-title' }, 'Details'));
      objBox.appendChild(el('div', { className: 'drawer-objective-text' }, task.description));
      inner.appendChild(objBox);
    }
    var statusSec = el('div', { className: 'drawer-section' });
    statusSec.appendChild(el('div', { className: 'drawer-label' }, 'Status'));
    var statusRow = el('div', { className: 'status-row' });
    STATUSES.forEach(function(st) {
      var chip = makeChip(st); chip.classList.add('status-btn');
      if (task.status === st) chip.classList.add('current');
      chip.addEventListener('click', function() {
        API.patch('/api/tasks/' + task.id, { status: st }).then(function() { toast('Status \u2192 ' + STATUS_LABELS[st]); openDrawer(task.id); loadAll().then(render); });
      });
      statusRow.appendChild(chip);

      var approveRow = el('div', { className: 'approve-row' });

      approveRow.appendChild(el('button', { className: 'btn-changes', onClick: function() { API.patch('/api/tasks/' + task.id, { status: 'in_progress' }).then(function() { toast('Sent back'); openDrawer(task.id); loadAll().then(render); }); } }, 'Request Changes'));
      statusSec.appendChild(approveRow);
    }
    inner.appendChild(statusSec);
    var priSec = el('div', { className: 'drawer-section' });
    priSec.appendChild(el('div', { className: 'drawer-label' }, 'Priority'));
    var priRow = el('div', { className: 'priority-row' });
    for (var p = 1; p <= 5; p++) {
      (function(pp) {
        priRow.appendChild(el('div', { className: 'pri-btn' + (task.priority === pp ? ' current' : ''), style: { background: PRI_BG[pp], color: PRI_COLORS[pp] }, onClick: function() {
          API.patch('/api/tasks/' + task.id, { priority: pp, override_priority: true }).then(function() { toast('Priority \u2192 ' + RANK_LABELS[pp]); openDrawer(task.id); loadAll().then(render); });
        } }, RANK_LABELS[pp]));
      })(p);
    }
    priSec.appendChild(priRow);
    inner.appendChild(priSec);
    var metaSec = el('div', { className: 'drawer-section' });
    metaSec.appendChild(el('div', { className: 'drawer-label' }, 'Details'));
    var metaGrid = el('div', { className: 'meta-grid' });
    if (task.category) { metaGrid.appendChild(el('span', { className: 'meta-key' }, 'Category')); metaGrid.appendChild(el('span', { className: 'meta-val' }, task.category)); }
    if (task.assignee) { metaGrid.appendChild(el('span', { className: 'meta-key' }, 'Assignee')); metaGrid.appendChild(el('span', { className: 'meta-val' }, getAvatar(task.assignee) + ' ' + task.assignee)); }
    if (task.branch) { metaGrid.appendChild(el('span', { className: 'meta-key' }, 'Branch')); metaGrid.appendChild(el('span', { className: 'meta-val mono' }, task.branch)); }
    if (task.created_by) { metaGrid.appendChild(el('span', { className: 'meta-key' }, 'Created by')); metaGrid.appendChild(el('span', { className: 'meta-val' }, getAvatar(task.created_by) + ' ' + task.created_by)); }
    if (task.created_at) { metaGrid.appendChild(el('span', { className: 'meta-key' }, 'Created')); metaGrid.appendChild(el('span', { className: 'meta-val' }, relTime(task.created_at))); }
    metaSec.appendChild(metaGrid);
    inner.appendChild(metaSec);
    var comSec = el('div', { className: 'drawer-section' });
    comSec.appendChild(el('div', { className: 'drawer-label' }, 'Comments (' + comments.length + ')'));
    comments.forEach(function(c) {
      var cm = el('div', { className: 'comment' }); var ch = el('div', { className: 'comment-header' });
      ch.appendChild(el('span', null, getAvatar(c.author))); ch.appendChild(el('span', { className: 'comment-author' }, c.author)); ch.appendChild(el('span', { className: 'comment-time' }, relTime(c.created_at)));
      cm.appendChild(ch); cm.appendChild(el('div', { className: 'comment-body' }, c.content)); comSec.appendChild(cm);
    });
    var inputRow = el('div', { className: 'comment-input-row' });
    var cInput = el('input', { placeholder: 'Add a comment...', id: 'comment-input' });
    function submitComment() { var val = cInput.value.trim(); if (!val) return; API.post('/api/tasks/' + task.id + '/comments', { content: val }).then(function() { toast('Comment added'); openDrawer(task.id); }); }
    cInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitComment(); });
    inputRow.appendChild(cInput);
    inputRow.appendChild(el('button', { className: 'btn-sm', onClick: submitComment }, 'Send'));
    comSec.appendChild(inputRow);
    inner.appendChild(comSec);
  });

function closeDrawer() { S.selectedTaskId = null; document.getElementById('overlay').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }

      selectedPri = pp; priSel.querySelectorAll('.pri-opt').forEach(function(el) { el.classList.remove('selected'); }); e.currentTarget.classList.add('selected');
    } }, RANK_LABELS[pp]));
  })(p); }
  priGroup.appendChild(priSel); inner.appendChild(priGroup);
  inner.appendChild(el('div', { className: 'form-group' }, el('label', { className: 'form-label' }, 'Assignee'), el('input', { className: 'form-input', id: 'ct-assign', placeholder: 'e.g. Socrates' })));
  inner.appendChild(el('div', { className: 'form-group' }, el('label', { className: 'form-label' }, 'Branch'), el('input', { className: 'form-input', id: 'ct-branch', placeholder: 'e.g. feature/new-thing' })));
  var actions = el('div', { className: 'modal-actions' });

function closeCreateModal() { S.createModal = false; document.getElementById('modal-overlay').classList.remove('open'); }

function openCreateChannelModal() {

function closeCreateChannelModal() { S.createChannelModal = false; document.getElementById('modal-overlay').classList.remove('open'); }

function render() {
  var app = document.getElementById('app');
  if (!S.authed) { renderLogin(); return; }
  clearChildren(app);
  renderNav(app);
  var main = el('div', { className: 'main', id: 'main' });
  app.appendChild(main);
  if (S.view === 'dashboard') renderDashboard(main);
  else if (S.view === 'board') renderBoard(main);
  else if (S.view === 'comms') renderComms(main);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { if (S.createModal) closeCreateModal(); else if (S.createChannelModal) closeCreateChannelModal(); else if (S.selectedTaskId) closeDrawer(); }
});

if (S.authed) { render(); loadAll().then(function() { S.loading = false; render(); }); }
else { render(); }

setInterval(function() { if (!S.authed || S.createModal || S.createChannelModal || S.selectedTaskId) return; loadAll().then(render); }, 30000);
})();
