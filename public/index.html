  var stagIcon = el('div', { className: 'faction-icon faction-icon-stag' }, '\u2693');
  stagCard.appendChild(stagIcon);
  var stagContent = el('div', { className: 'faction-content' });
  stagContent.appendChild(el('div', { className: 'faction-title' }, 'Staging'));
  stagContent.appendChild(el('div', { className: 'faction-url' }, 'flowstack-staging.up.railway.app'));
  stagCard.appendChild(stagContent);
  stagCard.appendChild(el('span', { className: 'faction-arrow' }, '\u2192'));
  links.appendChild(stagCard);
  wrap.appendChild(links);

  // Sprint Quest Tracker
  var ov = S.overview;
  var questCard = el('div', { className: 'card quest-card', style: { marginBottom: '24px' } });

  if (ov && ov.active_sprint) {
    var sp = ov.active_sprint;
    var tc = sp.task_counts || {};

    // Quest Header
    var qHeader = el('div', { className: 'quest-header' });
    var qTitleWrap = el('div', { className: 'quest-title-wrap' });
    qTitleWrap.appendChild(el('span', { className: 'quest-scroll-icon' }, '\uD83D\uDCDC'));
    qTitleWrap.appendChild(el('span', { className: 'quest-name' }, sp.name || 'Current Quest'));
    qHeader.appendChild(qTitleWrap);
    if (sp.target_end) {
      qHeader.appendChild(el('span', { className: 'quest-target' }, 'Target: ' + new Date(sp.target_end).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })));
    }
    questCard.appendChild(qHeader);

    // XP Progress Bar
    var pct = tc.total > 0 ? Math.round((tc.complete / tc.total) * 100) : 0;
    var xpBarWrap = el('div', { className: 'xp-bar-wrap' });
    var xpBarFill = el('div', { className: 'xp-bar-fill', style: { width: pct + '%' } });
    xpBarFill.appendChild(el('div', { className: 'xp-bar-glow' }));
    xpBarWrap.appendChild(xpBarFill);
    xpBarWrap.appendChild(el('div', { className: 'xp-bar-text' }, pct + '% \u2014 ' + (tc.complete || 0) + '/' + (tc.total || 0) + ' Missions'));
    questCard.appendChild(xpBarWrap);

    // Resource bars (category breakdown)
    if (tc.by_category) {
      var cats = tc.by_category;
      for (var ci = 0; ci < CATEGORIES.length; ci++) {
        var cat = CATEGORIES[ci];
        var cd = cats[cat.key] || { complete: 0, total: 0 };
        var cPct = cd.total > 0 ? (cd.complete / cd.total * 100) : 0;
        var row = el('div', { className: 'resource-row' });
        row.appendChild(el('span', { className: 'resource-icon' }, RESOURCE_ICONS[cat.key] || ''));
        row.appendChild(el('span', { className: 'resource-name' }, cat.label));
        var bw = el('div', { className: 'resource-bar-wrap' });
        bw.appendChild(el('div', { className: 'resource-bar', style: { width: cPct + '%', background: cat.color } }));
        row.appendChild(bw);
        row.appendChild(el('span', { className: 'resource-count' }, cd.complete + '/' + cd.total));
        questCard.appendChild(row);
      }
    }

    // Stat Badges
    var badges = el('div', { className: 'stat-badges' });
    var badgeData = [
      [tc.complete, 'Complete', 'var(--green)'],
      [tc.in_progress, 'Active', 'var(--orange)'],
      [tc.on_staging, 'Staging', 'var(--tan)'],
      [tc.queued, 'Queued', 'var(--text-muted)']
    ];
    for (var bi = 0; bi < badgeData.length; bi++) {
      var bd = badgeData[bi];
      if (bd[0] != null) {
        var badge = el('div', { className: 'stat-badge' });
        badge.appendChild(el('span', { className: 'stat-badge-count', style: { color: bd[2] } }, String(bd[0])));
        badge.appendChild(el('span', { className: 'stat-badge-label' }, bd[1]));
        badges.appendChild(badge);
      }
    }
    questCard.appendChild(badges);
  } else {
    var emptyState = el('div', { className: 'empty-state' });
    emptyState.appendChild(el('div', { className: 'empty-icon' }, '\uD83D\uDCDC'));
    emptyState.appendChild(el('div', { className: 'empty-heading' }, 'No active quest'));
    emptyState.appendChild(el('div', { className: 'empty-sub' }, 'Create a sprint to begin tracking your campaign'));
    questCard.appendChild(emptyState);
  }
  wrap.appendChild(questCard);

  // Active Missions (In Progress)
  var ipCard = el('div', { className: 'card', style: { marginBottom: '24px' } });
  ipCard.appendChild(el('div', { className: 'section-title' }, '\u2694\uFE0F Active Missions'));
  var ipTasks = S.tasks.filter(function(t) { return t.status === 'in_progress' || t.status === 'on_staging'; });
  if (ipTasks.length === 0) {
    ipCard.appendChild(el('div', { className: 'empty-text' }, 'No active missions \u2014 all quiet on the front'));
  } else {
    for (var ipi = 0; ipi < ipTasks.length; ipi++) {
      (function(t, idx) {
        var isStaging = t.status === 'on_staging';
        var taskRow = el('div', {
          className: 'mission-card' + (isStaging ? '' : ' mission-card-active'),
          style: { animationDelay: (idx * 50) + 'ms' },
          onClick: function() { playClick(); openDrawer(t.id); }
        });
        taskRow.appendChild(el('span', { className: 'mission-card-agent' }, getAgentAvatar(t.assignee)));
        taskRow.appendChild(makeRankBadge(t.priority));
        taskRow.appendChild(el('span', { className: 'mission-card-title' }, t.title || 'Untitled'));
        taskRow.appendChild(makeChip(t.status));
        ipCard.appendChild(taskRow);
      })(ipTasks[ipi], ipi);
    }
  }
  wrap.appendChild(ipCard);

  // Two-column bottom: Completed Today + Agent Leaderboard
  var bottomRow = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' } });

  // Completed Today
  var cdCard = el('div', { className: 'card' });
  var today = new Date().toISOString().slice(0, 10);
  var done = S.tasks.filter(function(t) { return t.status === 'complete' && t.updated_at && t.updated_at.slice(0, 10) === today; });
  cdCard.appendChild(el('div', { className: 'section-title' }, '\uD83C\uDFC6 Completed Today (' + done.length + ' XP earned)'));
  if (done.length === 0) {
    cdCard.appendChild(el('div', { className: 'empty-text' }, 'No missions completed today'));
  } else {
    for (var di = 0; di < done.length; di++) {
      (function(t) {
        var dRow = el('div', {
          className: 'achievement-card',
          onClick: function() { playClick(); openDrawer(t.id); }
        });
        dRow.appendChild(el('div', { className: 'achievement-badge' }, '\u2713'));
        dRow.appendChild(el('span', { className: 'achievement-title' }, t.title || 'Untitled'));
        cdCard.appendChild(dRow);
      })(done[di]);
    }
  }
  bottomRow.appendChild(cdCard);

  // Agent Leaderboard
  var lbCard = el('div', { className: 'card' });
  lbCard.appendChild(el('div', { className: 'section-title' }, '\uD83D\uDCCA Agent Scoreboard'));
  var lb = getLeaderboard();
  if (lb.length === 0) {
    lbCard.appendChild(el('div', { className: 'empty-text' }, 'No completed missions yet'));
  } else {
    var lbWrap = el('div', { className: 'leaderboard' });
    for (var li = 0; li < lb.length; li++) {
      var agent = lb[li];
      var rankClass = li === 0 ? 'leaderboard-rank-1' : (li === 1 ? 'leaderboard-rank-2' : (li === 2 ? 'leaderboard-rank-3' : ''));
      var row = el('div', { className: 'leaderboard-row' });
      row.appendChild(el('span', { className: 'leaderboard-rank ' + rankClass }, '#' + (li + 1)));
      row.appendChild(el('span', { className: 'leaderboard-avatar' }, getAgentAvatar(agent.name)));
      row.appendChild(el('span', { className: 'leaderboard-name' }, agent.name));
      row.appendChild(el('span', { className: 'leaderboard-score' }, agent.count + ' XP'));
      lbWrap.appendChild(row);
    }
    lbCard.appendChild(lbWrap);
  }
  bottomRow.appendChild(lbCard);
  wrap.appendChild(bottomRow);

  main.replaceChildren(wrap);
}

// ── Render Board (Mission Board) ──
function renderBoard() {
  var main = document.getElementById('main');
  var wrap = el('div', { className: 'view-enter' });

  // Sprint selector
  var selRow = el('div', { className: 'sprint-selector' });
  selRow.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--text-muted)', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '1px' } }, 'Campaign:'));
  var sel = el('select', { onChange: function(e) { S.selectedSprintId = e.target.value || null; loadTasks().then(render); } });
  sel.appendChild(el('option', { value: '' }, 'All Campaigns'));
  for (var si = 0; si < S.sprints.length; si++) {
    var sp = S.sprints[si];
    var opt = el('option', { value: String(sp.id) }, sp.name || ('Sprint ' + sp.id));
    if (S.selectedSprintId && String(sp.id) === String(S.selectedSprintId)) opt.selected = true;
    sel.appendChild(opt);
  }
  selRow.appendChild(sel);
  wrap.appendChild(selRow);

  var hasTasks = S.tasks.length > 0;

  if (!hasTasks) {
    var emptyBoard = el('div', { className: 'card' });
    var emptyInner = el('div', { className: 'empty-state' });
    emptyInner.appendChild(el('div', { className: 'empty-icon' }, '\u2694\uFE0F'));
    emptyInner.appendChild(el('div', { className: 'empty-heading' }, 'No missions deployed'));
    emptyInner.appendChild(el('div', { className: 'empty-sub' }, 'Deploy your first mission to begin the campaign'));
    emptyInner.appendChild(el('button', {
      className: 'empty-action ripple-host',
      onClick: function(e) { addRipple(e); playClick(); openCreateModal(null); }
    }, 'Deploy Mission'));
    emptyBoard.appendChild(emptyInner);
    wrap.appendChild(emptyBoard);
    main.appendChild(wrap);
    return;
  }

  // Board columns
  var board = el('div', { className: 'board' });

  for (var bci = 0; bci < CATEGORIES.length; bci++) {
    (function(cat) {
      var col = el('div', { className: 'board-col' });
      var catTasks = S.tasks.filter(function(t) { return t.category === cat.key; });
      catTasks.sort(function(a, b) {
        var ao = a.override_priority ? 1 : 0;
        var bo = b.override_priority ? 1 : 0;
        if (bo !== ao) return bo - ao;
        return (a.priority || 3) - (b.priority || 3);
      });

      var colHdr = el('div', {
        className: 'col-header',
        style: { background: cat.bg }
      });
      var hdrLeft = el('div', { className: 'col-header-left' });
      hdrLeft.appendChild(el('span', { className: 'col-icon' }, cat.icon));
      hdrLeft.appendChild(el('span', { className: 'col-title', style: { color: cat.color } }, cat.label));
      hdrLeft.appendChild(el('span', {
        className: 'col-count',
        style: { background: cat.bg, color: cat.color, border: '1px solid ' + cat.borderColor }
      }, String(catTasks.length)));
      colHdr.appendChild(hdrLeft);
      colHdr.appendChild(el('button', {
        className: 'col-add ripple-host',
        'data-tooltip': 'Deploy new ' + cat.label + ' mission',
        onClick: function(e) { addRipple(e); playClick(); openCreateModal(cat.key); }
      }, '+'));
      col.appendChild(colHdr);

      var scrollArea = el('div', { className: 'board-col-scroll' });

      if (catTasks.length === 0) {
        var emptyCol = el('div', { className: 'board-empty' });
        emptyCol.appendChild(el('div', { className: 'board-empty-icon' }, '\u2694\uFE0F'));
        emptyCol.appendChild(el('div', { className: 'board-empty-text' }, 'No missions assigned'));
        emptyCol.appendChild(el('button', {
          className: 'board-empty-link',
          onClick: function() { playClick(); openCreateModal(cat.key); }
        }, 'Deploy one'));
        scrollArea.appendChild(emptyCol);
      } else {
        for (var ti = 0; ti < catTasks.length; ti++) {
          (function(t, idx) {
            var isStaging = t.status === 'on_staging';
            var card = el('div', {
              className: 'board-card' + (isStaging ? ' board-card-staging' : ''),
              style: { animationDelay: (idx * 60) + 'ms' },
              onClick: function() { playClick(); openDrawer(t.id); }
            });

            // Left color bar
            card.style.setProperty('--cat-color', cat.color);
            var styleEl = card.querySelector('::before');
            card.firstChild; // force layout
            // We set the ::before color via a style on the card
            card.style.borderLeftColor = 'transparent';
            var colorBar = el('div', {
              style: {
                position: 'absolute', top: '0', bottom: '0', left: '0', width: '4px',
                background: cat.color, borderRadius: 'var(--radius-md) 0 0 var(--radius-md)'
              }
            });
            card.appendChild(colorBar);

            // Staging badge
            if (isStaging) {
              card.appendChild(el('span', { className: 'staging-badge' }, 'Ready for Review'));
            }

            var top = el('div', { className: 'board-card-top', style: { paddingLeft: '8px' } });
            top.appendChild(makeRankBadge(t.priority));
            top.appendChild(el('span', { className: 'board-card-title' }, t.title || 'Untitled'));
            card.appendChild(top);

            var meta = el('div', { className: 'board-card-meta', style: { paddingLeft: '8px' } });
            meta.appendChild(makeChip(t.status));
            if (t.assignee) {
              var assigneeWrap = el('span', { style: { display: 'flex', alignItems: 'center', gap: '4px' } });
              assigneeWrap.appendChild(el('span', { className: 'board-card-agent' }, getAgentAvatar(t.assignee)));
              assigneeWrap.appendChild(el('span', { className: 'board-card-assignee' }, t.assignee));
              meta.appendChild(assigneeWrap);
            }
            if (t.branch) {
              var branchEl = el('span', { className: 'board-card-branch' });
              branchEl.appendChild(el('span', { className: 'branch-icon' }, '\u2387'));
              branchEl.appendChild(document.createTextNode(t.branch));
              meta.appendChild(branchEl);
            }
            card.appendChild(meta);
            scrollArea.appendChild(card);
          })(catTasks[ti], ti);
        }
      }
      col.appendChild(scrollArea);
      board.appendChild(col);
    })(CATEGORIES[bci]);
  }
  wrap.appendChild(board);
  main.replaceChildren(wrap);
}

// ── Render Activity (Battle Log) ──
function renderActivity() {
  var main = document.getElementById('main');
  var wrap = el('div', { className: 'view-enter' });

  var card = el('div', { className: 'card' });
  card.appendChild(el('div', { className: 'section-title' }, '\uD83D\uDCDC Battle Log'));

  if (!S.activity.length) {
    var emptyAct = el('div', { className: 'empty-state' });
    emptyAct.appendChild(el('div', { className: 'empty-icon' }, '\u2694\uFE0F'));
    emptyAct.appendChild(el('div', { className: 'empty-heading' }, 'No battles recorded'));
    emptyAct.appendChild(el('div', { className: 'empty-sub' }, 'Actions will appear here as the campaign progresses'));
    card.appendChild(emptyAct);
  } else {
    var logWrap = el('div', { className: 'battle-log' });
    for (var ai = 0; ai < S.activity.length; ai++) {
      var a = S.activity[ai];
      var entry = el('div', { className: 'log-entry' });

      // Timeline dot
      var dotColor = ACTIVITY_COLORS[a.action] || 'var(--text-muted)';
      entry.appendChild(el('div', { className: 'log-dot', style: { background: dotColor } }));

      var body = el('div', { className: 'log-body' });
      var hdr = el('div', { className: 'log-header' });

      // Action icon
      var actionIcon = ACTIVITY_ICONS[a.action] || '\u2022';
      hdr.appendChild(el('span', { className: 'log-action-icon' }, actionIcon));

      if (a.actor) hdr.appendChild(el('span', { className: 'actor-pill' }, a.actor));

      hdr.appendChild(el('span', { className: 'log-time' }, relTime(a.created_at)));
      body.appendChild(hdr);

      var desc = a.task_title ? (a.action || '').replace(/_/g, ' ') + ': ' + a.task_title : (a.action || '').replace(/_/g, ' ');
      body.appendChild(el('div', { className: 'log-desc' }, desc));

      entry.appendChild(body);
      logWrap.appendChild(entry);
    }
    card.appendChild(logWrap);
  }
  wrap.appendChild(card);
  main.replaceChildren(wrap);
}

// ── Drawer ──
function openDrawer(taskId) {
  S.selectedTaskId = taskId;
  S.attachFormOpen = false;
  renderDrawer();
}

function closeDrawer() {
  S.selectedTaskId = null;
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function renderDrawer() {
  var overlay = document.getElementById('overlay');
  var drawer = document.getElementById('drawer');
  clearEl(drawer);

  if (!S.selectedTaskId) { closeDrawer(); return; }

  overlay.classList.add('open');
  overlay.onclick = closeDrawer;
  drawer.classList.add('open');

  // Header strip
  drawer.appendChild(el('div', { className: 'drawer-header-strip' }));
  var inner = el('div', { className: 'drawer-inner' });

  // Show skeleton while loading
  renderSkeleton(inner, 4);
  drawer.appendChild(inner);

  API.get('/api/tasks/' + S.selectedTaskId).then(function(data) {
    if (!data) { closeDrawer(); return; }

    var task, comments, files;
    if (data.task) {
      task = data.task;
      comments = data.comments || [];
      files = data.files || [];
    } else {
      task = data;
      comments = data.comments || [];
      files = data.files || [];
    }

    clearEl(inner);

    // Close button
    inner.appendChild(el('button', { className: 'drawer-close', onClick: function() { playClick(); closeDrawer(); } }, '\u2715'));

    // Title
    inner.appendChild(el('div', { className: 'drawer-title' }, task.title || 'Untitled'));

    // Objective & Done When
    if (task.description) {
      var parts = task.description.split(/\n(?=Done[: ]|Done when[: ])/i);
      var objective = parts[0].trim();
      var doneWhen = parts.length > 1 ? parts[1].replace(/^Done(?:\s*when)?[:\s]*/i, '').trim() : null;

      var objBox = el('div', { className: 'drawer-objective' });
      objBox.appendChild(el('span', { className: 'drawer-objective-icon' }, '\uD83D\uDCDC'));
      objBox.appendChild(el('div', { className: 'drawer-objective-title' }, 'Objective'));
      objBox.appendChild(el('div', { className: 'drawer-objective-text' }, objective));
      inner.appendChild(objBox);

      if (doneWhen) {
        var doneBox = el('div', { className: 'drawer-done' });
        doneBox.appendChild(el('span', { className: 'drawer-done-icon' }, '\uD83C\uDFAF'));
        doneBox.appendChild(el('div', { className: 'drawer-done-title' }, 'Done When'));
        doneBox.appendChild(el('div', { className: 'drawer-done-text' }, doneWhen));
        inner.appendChild(doneBox);
      }
    } else {
      var emptyObj = el('div', { className: 'drawer-objective', style: { opacity: '0.5' } });
      emptyObj.appendChild(el('span', { className: 'drawer-objective-icon' }, '\uD83D\uDCDC'));
      emptyObj.appendChild(el('div', { className: 'drawer-objective-title' }, 'Objective'));
      emptyObj.appendChild(el('div', { className: 'drawer-objective-text' }, 'No briefing yet'));
      inner.appendChild(emptyObj);
    }

    // Status row
    var statusSec = el('div', { className: 'drawer-section' });
    statusSec.appendChild(el('div', { className: 'drawer-label' }, 'Status'));
    var statusRow = el('div', { className: 'status-row' });
    for (var sti = 0; sti < STATUSES.length; sti++) {
      (function(st) {
        var chip = makeChip(st);
        chip.classList.add('status-btn');
        chip.setAttribute('data-tooltip', STATUS_TOOLTIPS[st]);
        if (task.status === st) chip.classList.add('current');
        chip.addEventListener('click', function() {
          playClick();
          var prevStatus = task.status;
          API.patch('/api/tasks/' + task.id, { status: st }).then(function() {
            task.status = st;
            chip.classList.add('status-flash');
            setTimeout(function() { chip.classList.remove('status-flash'); }, 300);
            if (st === 'complete' && prevStatus !== 'complete') {
              toast('Mission Complete!', 'achievement');
              playAchievement();
              S.xpCount++;
            } else {
              toast('Status updated to ' + STATUS_LABELS[st]);
            }
            renderDrawer();
            loadAll().then(function() { renderMain(); renderNav(); });
          });
        });
        statusRow.appendChild(chip);
      })(STATUSES[sti]);
    }
    statusSec.appendChild(statusRow);

    // Approve / Request Changes for on_staging
    if (task.status === 'on_staging') {
      var approveRow = el('div', { className: 'approve-row' });
      approveRow.appendChild(el('button', {
        className: 'btn-approve ripple-host',
        onClick: function(e) {
          addRipple(e); playClick();
          API.patch('/api/tasks/' + task.id, { status: 'approved' }).then(function() {
            toast('Mission approved');
            renderDrawer();
            loadAll().then(function() { renderMain(); });
          });
        }
      }, '\u2713 Approve Mission'));
      approveRow.appendChild(el('button', {
        className: 'btn-changes ripple-host',
        onClick: function(e) {
          addRipple(e); playClick();
          API.patch('/api/tasks/' + task.id, { status: 'in_progress' }).then(function() {
            toast('Sent back for revision');
            renderDrawer();
            loadAll().then(function() { renderMain(); });
          });
        }
      }, 'Request Changes'));
      statusSec.appendChild(approveRow);
    }
    inner.appendChild(statusSec);

    // Priority row
    var priSec = el('div', { className: 'drawer-section' });
    priSec.appendChild(el('div', { className: 'drawer-label' }, 'Priority'));
    var priRow = el('div', { className: 'priority-row' });
    for (var p = 1; p <= 5; p++) {
      (function(pp) {
        var btn = el('div', {
          className: 'pri-btn' + (task.priority === pp ? ' current' : ''),
          style: { background: PRI_BG[pp], color: PRI_COLORS[pp] },
          onClick: function() {
            playClick();
            API.patch('/api/tasks/' + task.id, { priority: pp, override_priority: true }).then(function() {
              toast('Priority set to ' + RANK_LABELS[pp]);
              renderDrawer();
              loadTasks().then(function() { renderMain(); });
            });
          }
        }, RANK_LABELS[pp]);
        priRow.appendChild(btn);
      })(p);
    }
    priSec.appendChild(priRow);
    inner.appendChild(priSec);

    // Meta
    var metaSec = el('div', { className: 'drawer-section' });
    metaSec.appendChild(el('div', { className: 'drawer-label' }, 'Intel'));
    var grid = el('div', { className: 'meta-grid' });
    if (task.category) {
      grid.appendChild(el('span', { className: 'meta-key' }, 'Category'));
      var catLabel = task.category;
      var catIcon = '';
      for (var cli = 0; cli < CATEGORIES.length; cli++) {
        if (CATEGORIES[cli].key === task.category) {
          catLabel = CATEGORIES[cli].label;
          catIcon = CATEGORIES[cli].icon;
        }
      }
      var catVal = el('span', { className: 'meta-val' });
      if (catIcon) catVal.appendChild(document.createTextNode(catIcon + ' '));
      catVal.appendChild(document.createTextNode(catLabel));
      grid.appendChild(catVal);
    }
    if (task.assignee) {
      grid.appendChild(el('span', { className: 'meta-key' }, 'Agent'));
      var assignVal = el('span', { className: 'meta-val' });
      assignVal.appendChild(el('span', { className: 'meta-agent-avatar' }, getAgentAvatar(task.assignee)));
      assignVal.appendChild(document.createTextNode(task.assignee));
      grid.appendChild(assignVal);
    }
    if (task.branch) {
      grid.appendChild(el('span', { className: 'meta-key' }, 'Branch'));
      var branchVal = el('span', { className: 'meta-val mono' });
      branchVal.appendChild(document.createTextNode('\u2387 ' + task.branch));
      grid.appendChild(branchVal);
    }
    if (task.created_by) {
      grid.appendChild(el('span', { className: 'meta-key' }, 'Created by'));
      var creatorVal = el('span', { className: 'meta-val' });
      creatorVal.appendChild(el('span', { className: 'meta-agent-avatar' }, getAgentAvatar(task.created_by)));
      creatorVal.appendChild(document.createTextNode(task.created_by));
      grid.appendChild(creatorVal);
    }
    if (task.sprint_id) {
      var sprintName = 'Sprint ' + task.sprint_id;
      for (var spi = 0; spi < S.sprints.length; spi++) {
        if (S.sprints[spi].id === task.sprint_id) sprintName = S.sprints[spi].name;
      }
      grid.appendChild(el('span', { className: 'meta-key' }, 'Campaign'));
      grid.appendChild(el('span', { className: 'meta-val' }, sprintName));
    }
    if (task.created_at) {
      grid.appendChild(el('span', { className: 'meta-key' }, 'Deployed'));
      grid.appendChild(el('span', { className: 'meta-val' }, relTime(task.created_at)));
    }
    if (task.updated_at) {
      grid.appendChild(el('span', { className: 'meta-key' }, 'Last Update'));
      grid.appendChild(el('span', { className: 'meta-val' }, relTime(task.updated_at)));
    }
    metaSec.appendChild(grid);
    inner.appendChild(metaSec);

    // Files
    var fileSec = el('div', { className: 'drawer-section' });
    fileSec.appendChild(el('div', { className: 'drawer-label' }, '\uD83D\uDCC1 Attachments'));
    for (var fi = 0; fi < files.length; fi++) {
      var fItem = el('div', { className: 'file-item' });
      fItem.appendChild(el('span', { className: 'file-icon' }, '\uD83D\uDCC4'));
      fItem.appendChild(document.createTextNode(files[fi].filename || files[fi].name || 'file'));
      fileSec.appendChild(fItem);
    }

    if (S.attachFormOpen) {
      var form = el('div', { className: 'attach-form' });
      var fnInput = el('input', { placeholder: 'Filename', id: 'attach-fn' });
      var fcInput = el('textarea', { placeholder: 'Content / URL', id: 'attach-ct' });
      var fRow = el('div', { style: { display: 'flex', gap: '8px' } });
      fRow.appendChild(el('button', { className: 'btn-sm ripple-host', onClick: function(e) {
        addRipple(e); playClick();
        var fn = document.getElementById('attach-fn').value.trim();
        var ct = document.getElementById('attach-ct').value.trim();
        if (!fn) return;
        API.post('/api/tasks/' + task.id + '/files', { filename: fn, url_or_content: ct }).then(function() {
          S.attachFormOpen = false;
          toast('File attached');
          renderDrawer();
        });
      } }, 'Save'));
      fRow.appendChild(el('button', { className: 'btn-sm ripple-host', onClick: function(e) { addRipple(e); S.attachFormOpen = false; renderDrawer(); } }, 'Cancel'));
      form.appendChild(fnInput);
      form.appendChild(fcInput);
      form.appendChild(fRow);
      fileSec.appendChild(form);
    } else {
      fileSec.appendChild(el('button', {
        className: 'btn-sm ripple-host',
        style: { marginTop: '8px' },
        onClick: function(e) { addRipple(e); playClick(); S.attachFormOpen = true; renderDrawer(); }
      }, '+ Attach File'));
    }
    inner.appendChild(fileSec);

    // Comments
    var comSec = el('div', { className: 'drawer-section' });
    comSec.appendChild(el('div', { className: 'drawer-label' }, '\uD83D\uDCAC Comms (' + comments.length + ')'));
    for (var cmi = 0; cmi < comments.length; cmi++) {
      var c = comments[cmi];
      var cm = el('div', { className: 'comment' });
      var ch = el('div', { className: 'comment-header' });
      if (c.author) {
        ch.appendChild(el('span', { className: 'comment-avatar' }, getAgentAvatar(c.author)));
        ch.appendChild(el('span', { className: 'comment-author' }, c.author));
      }
      ch.appendChild(el('span', { className: 'comment-time' }, relTime(c.created_at)));
      cm.appendChild(ch);
      cm.appendChild(el('div', { className: 'comment-body' }, c.content || c.body || ''));
      comSec.appendChild(cm);
    }

    var inputRow = el('div', { className: 'comment-input-row' });
    var cInput = el('input', { placeholder: 'Send a message...', id: 'comment-input' });
    cInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') postComment(task.id); });
    inputRow.appendChild(cInput);
    inputRow.appendChild(el('button', {
      className: 'btn-sm ripple-host',
      onClick: function(e) { addRipple(e); playClick(); postComment(task.id); }
    }, 'Send'));
    comSec.appendChild(inputRow);
    inner.appendChild(comSec);
  });
}

function postComment(taskId) {
  var inp = document.getElementById('comment-input');
  if (!inp) return;
  var val = inp.value.trim();
  if (!val) return;
  API.post('/api/tasks/' + taskId + '/comments', { content: val }).then(function() {
    toast('Message sent');
    renderDrawer();
  });
}

// ── Create Modal (New Mission) ──
function openCreateModal(category) {
  S.createModal = true;
  S.createCategory = category;
  renderCreateModal();
}

function closeCreateModal() {
  S.createModal = false;
  S.createCategory = null;
  document.getElementById('modal-overlay').classList.remove('open');
}

function renderCreateModal() {
  var overlay = document.getElementById('modal-overlay');
  var modal = document.getElementById('modal');
  clearEl(modal);

  if (!S.createModal) { closeCreateModal(); return; }
  overlay.classList.add('open');
  overlay.onclick = function(e) { if (e.target === overlay) closeCreateModal(); };

  // Header strip
  modal.appendChild(el('div', { className: 'modal-header-strip' }));
  var inner = el('div', { className: 'modal-inner' });

  inner.appendChild(el('div', { className: 'modal-title' }, '\u2694\uFE0F New Mission'));

  var selectedCat = S.createCategory || CATEGORIES[0].key;
  var selectedPri = 3;

  // Title
  var gTitle = el('div', { className: 'form-group' });
  gTitle.appendChild(el('label', { className: 'form-label' }, 'Mission Name *'));
  gTitle.appendChild(el('input', { className: 'form-input', id: 'ct-title', placeholder: 'What is the objective?' }));
  inner.appendChild(gTitle);

  // Description
  var gDesc = el('div', { className: 'form-group' });
  gDesc.appendChild(el('label', { className: 'form-label' }, 'Briefing'));
  gDesc.appendChild(el('textarea', { className: 'form-textarea', id: 'ct-desc', placeholder: 'Mission details, context, requirements...' }));
  inner.appendChild(gDesc);

  // Category (large clickable cards)
  var gCat = el('div', { className: 'form-group' });
  gCat.appendChild(el('label', { className: 'form-label' }, 'Division'));
  var catSel = el('div', { className: 'cat-selector', id: 'ct-cat-selector' });
  for (var ci = 0; ci < CATEGORIES.length; ci++) {
    (function(cat) {
      var catCard = el('div', {
        className: 'cat-card' + (selectedCat === cat.key ? ' selected' : ''),
        style: selectedCat === cat.key ? { borderColor: cat.color, background: cat.bg } : {},
        onClick: function() {
          playClick();
          selectedCat = cat.key;
          var all = catSel.querySelectorAll('.cat-card');
          for (var ai = 0; ai < all.length; ai++) {
            all[ai].classList.remove('selected');
            all[ai].style.borderColor = '';
            all[ai].style.background = '';
          }
          catCard.classList.add('selected');
          catCard.style.borderColor = cat.color;
          catCard.style.background = cat.bg;
        }
      });
      catCard.appendChild(el('span', { className: 'cat-card-icon' }, cat.icon));
      catCard.appendChild(el('span', { className: 'cat-card-name', style: { color: selectedCat === cat.key ? cat.color : '' } }, cat.label));
      catSel.appendChild(catCard);
    })(CATEGORIES[ci]);
  }
  gCat.appendChild(catSel);
  inner.appendChild(gCat);

  // Priority (rank badges)
  var gPri = el('div', { className: 'form-group' });
  gPri.appendChild(el('label', { className: 'form-label' }, 'Threat Level'));
  var priSel = el('div', { className: 'pri-selector' });
  for (var p = 1; p <= 5; p++) {
    (function(pp) {
      var optEl = el('div', {
        className: 'pri-opt' + (pp === 3 ? ' selected' : ''),
        style: { background: PRI_BG[pp], color: PRI_COLORS[pp] },
        onClick: function(e) {
          playClick();
          selectedPri = pp;
          var all = priSel.querySelectorAll('.pri-opt');
          for (var ai = 0; ai < all.length; ai++) all[ai].classList.remove('selected');
          e.currentTarget.classList.add('selected');
        }
      }, RANK_LABELS[pp]);
      priSel.appendChild(optEl);
    })(p);
  }
  gPri.appendChild(priSel);
  inner.appendChild(gPri);

  // Assignee
  var gAssign = el('div', { className: 'form-group' });
  gAssign.appendChild(el('label', { className: 'form-label' }, 'Assigned Agent'));
  gAssign.appendChild(el('input', { className: 'form-input', id: 'ct-assign', placeholder: 'e.g. Socrates' }));
  inner.appendChild(gAssign);

  // Branch
  var gBranch = el('div', { className: 'form-group' });
  gBranch.appendChild(el('label', { className: 'form-label' }, 'Branch'));
  gBranch.appendChild(el('input', { className: 'form-input', id: 'ct-branch', placeholder: 'e.g. feature/new-thing' }));
  inner.appendChild(gBranch);

  // Actions
  var actions = el('div', { className: 'modal-actions' });
  actions.appendChild(el('button', {
    className: 'btn-cancel ripple-host',
    onClick: function(e) { addRipple(e); playClick(); closeCreateModal(); }
  }, 'Stand Down'));
  actions.appendChild(el('button', {
    className: 'btn-create ripple-host',
    onClick: function(e) {
      addRipple(e); playClick();
      var title = document.getElementById('ct-title').value.trim();
      if (!title) {
        document.getElementById('ct-title').classList.add('error');
        document.getElementById('ct-title').focus();
        return;
      }
      var body = {
        title: title,
        category: selectedCat,
        priority: selectedPri
      };
      var desc = document.getElementById('ct-desc').value.trim();
      if (desc) body.description = desc;
      var assignee = document.getElementById('ct-assign').value.trim();
      if (assignee) body.assignee = assignee;
      var branch = document.getElementById('ct-branch').value.trim();
      if (branch) body.branch = branch;
      if (S.selectedSprintId) body.sprint_id = parseInt(S.selectedSprintId);

      API.post('/api/tasks', body).then(function() {
        toast('Mission deployed');
        closeCreateModal();
        loadAll().then(render);
      });
    }
  }, '\u2694 Deploy Mission'));
  inner.appendChild(actions);

  modal.appendChild(inner);
  modal.onclick = function(e) { e.stopPropagation(); };

  // Auto-focus title
  setTimeout(function() {
    var titleInput = document.getElementById('ct-title');
    if (titleInput) titleInput.focus();
  }, 100);
}

// ── Main Render ──
// ── Comms ──
function getThreads() {
  var threadMap = {};
  for (var i = 0; i < S.messages.length; i++) {
    var m = S.messages[i];
    var tid = m.thread_id || (m.sender < m.recipient ? m.sender + '_' + m.recipient : m.recipient + '_' + m.sender);
    if (!threadMap[tid]) threadMap[tid] = { thread_id: tid, messages: [], unread: 0 };
    threadMap[tid].messages.push(m);
    if (!m.read) threadMap[tid].unread++;
  }
  var threads = Object.values(threadMap);
  // Sort by last message time desc
  threads.sort(function(a, b) {
    var aLast = a.messages[a.messages.length - 1].created_at;
    var bLast = b.messages[b.messages.length - 1].created_at;
    return new Date(bLast) - new Date(aLast);
  });
  return threads;
}

function markThreadRead(threadId) {
  API.patch('/api/messages/read', { thread_id: threadId }).then(function() {
    loadMessages().then(function() { renderComms(); });
  });
}

function sendMessage() {
  var content = S.composeContent.trim();
  var thread = S.selectedThread;
  if (!content || !thread) return;
  // Pick the participant that is NOT the current actor
  var parts = thread.split('_');
  var recipient = parts[0] === S.actor ? (parts[1] || parts[0]) : parts[0];
  API.post('/api/messages', { recipient: recipient, content: content, thread_id: thread }).then(function(data) {
    if (data) {
      S.composeContent = '';
      loadMessages().then(function() { renderComms(); });
    }
  });
}

function renderComms() {
  var main = document.getElementById('main');
  var wrap = el('div', { className: 'view-enter comms-layout' });

  var threads = getThreads();

  // ── Sidebar ──
  var sidebar = el('div', { className: 'comms-sidebar' });
  sidebar.appendChild(el('div', { className: 'section-title' }, '\uD83D\uDCAC Comms'));

  if (!threads.length) {
    var emptyThread = el('div', { className: 'empty-state' });
    emptyThread.appendChild(el('div', { className: 'empty-icon' }, '\uD83D\uDCAC'));
    emptyThread.appendChild(el('div', { className: 'empty-heading' }, 'No messages yet'));
    emptyThread.appendChild(el('div', { className: 'empty-sub' }, 'Agent communications will appear here'));
    sidebar.appendChild(emptyThread);
  } else {
    for (var ti = 0; ti < threads.length; ti++) {
      (function(thread) {
        var lastMsg = thread.messages[thread.messages.length - 1];
        var isActive = S.selectedThread === thread.thread_id;
        var item = el('div', {
          className: 'thread-item' + (isActive ? ' active' : '') + (thread.unread > 0 ? ' unread-thread' : ''),
          onClick: function() {
            S.selectedThread = thread.thread_id;
            markThreadRead(thread.thread_id);
          }
        });
        var itemLeft = el('div', { className: 'thread-item-left' });
        var parts = thread.thread_id ? thread.thread_id.split('_') : ['?'];
        var avatarStr = parts.map(function(p) { return getAgentAvatar(p); }).join(' ');
        itemLeft.appendChild(el('div', { className: 'thread-avatar' }, avatarStr));
        var itemBody = el('div', { className: 'thread-body' });
        var itemHeader = el('div', { className: 'thread-header' });
        itemHeader.appendChild(el('span', { className: 'thread-names' }, parts.map(function(p) { return p.charAt(0).toUpperCase() + p.slice(1); }).join(' \u2194 ')));
        itemHeader.appendChild(el('span', { className: 'thread-time' }, relTime(lastMsg.created_at)));
        itemBody.appendChild(itemHeader);
        var preview = el('div', { className: 'thread-preview' }, lastMsg.content.slice(0, 80) + (lastMsg.content.length > 80 ? '\u2026' : ''));
        itemBody.appendChild(preview);
        item.appendChild(itemLeft);
        item.appendChild(itemBody);
        if (thread.unread > 0) {
          item.appendChild(el('div', { className: 'unread-badge' }, String(thread.unread)));
        }
        sidebar.appendChild(item);
      })(threads[ti]);
    }
  }
  wrap.appendChild(sidebar);

  // ── Chat Area ──
  var chatArea = el('div', { className: 'comms-chat' });

  if (!S.selectedThread) {
    // Auto-select first thread
    if (threads.length) {
      S.selectedThread = threads[0].thread_id;
      markThreadRead(threads[0].thread_id);
      renderComms();
      return;
    }
    var noneSelected = el('div', { className: 'comms-empty-chat' });
    noneSelected.appendChild(el('div', { className: 'empty-icon' }, '\u2190'));
    noneSelected.appendChild(el('div', { className: 'empty-heading' }, 'Select a thread'));
    chatArea.appendChild(noneSelected);
  } else {
    // Find thread messages
    var activeThread = null;
    for (var ati = 0; ati < threads.length; ati++) {
      if (threads[ati].thread_id === S.selectedThread) { activeThread = threads[ati]; break; }
    }
    if (activeThread) {
      // Chat header
      var chatHeader = el('div', { className: 'chat-header' });
      var hParts = S.selectedThread.split('_');
      chatHeader.appendChild(el('span', { className: 'chat-header-names' },
        hParts.map(function(p) { return getAgentAvatar(p) + ' ' + p.charAt(0).toUpperCase() + p.slice(1); }).join('  \u2194  ')
      ));
      chatArea.appendChild(chatHeader);

      // Messages
      var msgList = el('div', { className: 'chat-messages', id: 'chat-messages' });
      for (var mi = 0; mi < activeThread.messages.length; mi++) {
        (function(msg) {
          var bubble = el('div', { className: 'chat-bubble' });
          var meta = el('div', { className: 'bubble-meta' });
          meta.appendChild(el('span', { className: 'bubble-avatar' }, getAgentAvatar(msg.sender)));
          meta.appendChild(el('span', { className: 'bubble-sender' }, msg.sender.charAt(0).toUpperCase() + msg.sender.slice(1)));
          meta.appendChild(el('span', { className: 'bubble-time' }, relTime(msg.created_at)));
          bubble.appendChild(meta);
          bubble.appendChild(el('div', { className: 'bubble-content' }, msg.content));
          msgList.appendChild(bubble);
        })(activeThread.messages[mi]);
      }
      chatArea.appendChild(msgList);

      // Input bar
      var inputBar = el('div', { className: 'chat-input-bar' });
      var textarea = el('textarea', {
        className: 'chat-input',
        placeholder: 'Message this thread\u2026',
        value: S.composeContent,
        onInput: function(e) { S.composeContent = e.target.value; },
        onKeydown: function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
      });
      var sendBtn = el('button', { className: 'chat-send-btn ripple-host', onClick: function(e) { addRipple(e); sendMessage(); } }, 'Send');
      inputBar.appendChild(textarea);
      inputBar.appendChild(sendBtn);
      chatArea.appendChild(inputBar);
    }
  }

  wrap.appendChild(chatArea);
  main.replaceChildren(wrap);

  // Scroll to bottom of messages after paint
  requestAnimationFrame(function() {
    var msgEl = document.getElementById('chat-messages');
    if (msgEl) msgEl.scrollTop = msgEl.scrollHeight;
  });
}


function renderMain() {
  if (S.view === 'overview') renderOverview();
  else if (S.view === 'board') renderBoard();
  else if (S.view === 'activity') renderActivity();
  else if (S.view === 'comms') renderComms();
}

function render() {
  renderNav();
  renderMain();
}

// ── Escape key ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (S.createModal) closeCreateModal();
    else if (S.selectedTaskId) closeDrawer();
  }
});

// ── Init ──
render();
loadAll().then(function() {
  S.loading = false;
  S.prevXpCount = S.xpCount; // prevent initial achievement toasts
  render();
});

// Auto-refresh every 30s, skip if modal/drawer open
setInterval(function() {
  if (S.createModal || S.selectedTaskId) return;
  var prevSnapshot = JSON.stringify({ tasks: S.tasks, overview: S.overview, sprints: S.sprints, activity: S.activity });
  loadAll().then(function() {
    var newSnapshot = JSON.stringify({ tasks: S.tasks, overview: S.overview, sprints: S.sprints, activity: S.activity });
    if (newSnapshot === prevSnapshot) return; // nothing changed — skip DOM update entirely
    var mainEl = document.getElementById('main');
    mainEl.style.opacity = '0';
    requestAnimationFrame(function() {
      render();
      requestAnimationFrame(function() { mainEl.style.opacity = '1'; });
    });
  });
}, 30000);

})();
</script>
